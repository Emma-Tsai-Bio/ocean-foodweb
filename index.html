<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海洋生態食物鏈</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @keyframes shimmer { 100% { transform: translateX(100%); } }
        .animate-shimmer { animation: shimmer 2s infinite; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        .animate-slide-up { animation: slideUp 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 拖放時的視覺回饋 */
        .drag-over { border-color: #4f46e5 !important; background-color: #e0e7ff !important; }
    </style>
</head>
<body class="bg-cyan-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // --- 內建圖示元件 ---
        const IconBase = ({ children, className, ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
                {children}
            </svg>
        );

        const Fish = (props) => <IconBase {...props}><path d="M6.5 12c.94-3.46 4.96-6 8.5-6 3.54 0 6.46 2.31 7.5 5.5-1.04 3.19-3.96 5.5-7.5 5.5-3.54 0-7.56-2.54-8.5-6Z"/><path d="M18 12v.5"/></IconBase>;
        const Utensils = (props) => <IconBase {...props}><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></IconBase>;
        const Activity = (props) => <IconBase {...props}><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></IconBase>;
        const Plus = (props) => <IconBase {...props}><path d="M5 12h14"/><path d="M12 5v14"/></IconBase>;
        const Minus = (props) => <IconBase {...props}><path d="M5 12h14"/></IconBase>;
        const RefreshCw = (props) => <IconBase {...props}><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 21h-5v-5"/></IconBase>;
        const Trophy = (props) => <IconBase {...props}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></IconBase>;
        const Users = (props) => <IconBase {...props}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></IconBase>;
        const Calculator = (props) => <IconBase {...props}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></IconBase>;
        const ScrollText = (props) => <IconBase {...props}><path d="M8 21h12a2 2 0 0 0 2-2v-2a10 10 0 0 0-10-10c-5.52 0-10 4.48-10 10v2a2 2 0 0 0 2 2h2c1.66 0 3-1.34 3-3V9c0-1.1.9-2 2-2h4"/><path d="M19 17V5a2 2 0 0 0-2-2H4"/></IconBase>;
        const AlertCircle = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></IconBase>;
        const Copy = (props) => <IconBase {...props}><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></IconBase>;
        const Swords = (props) => <IconBase {...props}><polyline points="14.5 17.5 3 6 3 3 6 3 17.5 14.5"/><line x1="13" x2="19" y1="19" y2="13"/><line x1="16" x2="20" y1="16" y2="20"/><line x1="19" x2="21" y1="21" y2="19"/><polyline points="14.5 6.5 18 3 21 3 21 6 17.5 9.5"/><line x1="5" x2="9" y1="14" y2="10"/><line x1="17" x2="11" y1="11" y2="17"/><line x1="9" x2="7" y1="21" y2="19"/><line x1="11" x2="13" y1="15" y2="13"/></IconBase>;
        const Leaf = (props) => <IconBase {...props}><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.5 1 10-2.45 4-7.5 5.5-9 8Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></IconBase>;
        const ShieldAlert = (props) => <IconBase {...props}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></IconBase>;
        const GraduationCap = (props) => <IconBase {...props}><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></IconBase>;
        const School = (props) => <IconBase {...props}><path d="m4 6 8-4 8 4"/><path d="m18 10 4 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-8l4-2"/><path d="M14 22v-4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v4"/><path d="M18 5v17"/><path d="M6 5v17"/><circle cx="12" cy="9" r="2"/></IconBase>;
        const Network = (props) => <IconBase {...props}><rect x="16" y="16" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/><path d="M5 16v-3a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v3"/><path d="M12 8v4"/></IconBase>;

        // --- 設定檔與常數 ---
        const CardType = { ALGAE: 'algae', COPEPOD: 'copepod', KRILL: 'krill', HERRING: 'herring', SQUID: 'squid', SHARK: 'shark' };

        const BASE_RATIO_CONFIG = [
            { type: CardType.ALGAE, ratio: 10/36, name: '浮游藻類', score: 1, color: 'bg-green-100 border-green-500 text-green-800', desc: '無條件得分' },
            { type: CardType.COPEPOD, ratio: 7/36, name: '劍水蚤', score: 2, color: 'bg-yellow-100 border-yellow-500 text-yellow-800', desc: '需 2 藻類' },
            { type: CardType.KRILL, ratio: 7/36, name: '磷蝦', score: 2, color: 'bg-orange-100 border-orange-500 text-orange-800', desc: '需 2 藻類' },
            { type: CardType.HERRING, ratio: 6/36, name: '鯡魚', score: 3, color: 'bg-blue-100 border-blue-500 text-blue-800', desc: '需 3 藻類 + 1 劍水蚤' },
            { type: CardType.SQUID, ratio: 4/36, name: '烏賊', score: 3, color: 'bg-purple-100 border-purple-500 text-purple-800', desc: '需 2 磷蝦 + 1 劍水蚤' },
            { type: CardType.SHARK, ratio: 2/36, name: '鯊魚', score: 4, color: 'bg-red-100 border-red-500 text-red-800', desc: '需 2 鯡魚 + 2 烏賊' },
        ];

        const CARD_INFO = BASE_RATIO_CONFIG.reduce((acc, card) => { acc[card.type] = card; return acc; }, {});

        // 食物網階層設定 (調整為半透明背景，方便箭頭顯示)
        const TROPHIC_LEVELS = [
            { id: 'producer', name: '生產者', bgColor: 'bg-green-500/10', borderColor: 'border-green-400', textColor: 'text-green-700', expects: [CardType.ALGAE] },
            { id: 'primary', name: '初級消費者', bgColor: 'bg-yellow-500/10', borderColor: 'border-yellow-400', textColor: 'text-yellow-700', expects: [CardType.COPEPOD, CardType.KRILL] },
            { id: 'secondary', name: '次級消費者', bgColor: 'bg-orange-500/10', borderColor: 'border-orange-400', textColor: 'text-orange-700', expects: [CardType.HERRING, CardType.SQUID] },
            { id: 'tertiary', name: '三級消費者', bgColor: 'bg-red-500/10', borderColor: 'border-red-400', textColor: 'text-red-700', expects: [CardType.SHARK] },
        ];

        // --- 輔助函式 ---
        const generateDeckByPlayers = (numPlayers) => {
            const cardsPerPlayer = 5; 
            const totalCards = numPlayers * cardsPerPlayer; 
            let deck = [];
            BASE_RATIO_CONFIG.forEach(({ type, ratio }) => {
                const count = Math.round(totalCards * ratio);
                for (let i = 0; i < count; i++) deck.push(type);
            });
            while (deck.length < totalCards) deck.push(CardType.ALGAE);
            while (deck.length > totalCards) deck.pop();
            return deck;
        };

        const shuffleDeck = (deck) => {
            const newDeck = [...deck];
            for (let i = newDeck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newDeck[i], newDeck[j]] = [newDeck[j], newDeck[i]];
            }
            return newDeck;
        };

        const countCards = (cardList) => {
            const counts = { [CardType.ALGAE]: 0, [CardType.COPEPOD]: 0, [CardType.KRILL]: 0, [CardType.HERRING]: 0, [CardType.SQUID]: 0, [CardType.SHARK]: 0 };
            cardList.forEach(type => { if (counts[type] !== undefined) counts[type]++; });
            return counts;
        };

        const getPlayerLabel = (index) => String.fromCharCode(65 + index);

        // --- 主程式元件 ---
        function OceanCardGame() {
            const [viewMode, setViewMode] = useState('home');
            
            // --- Intro (教學) 狀態 ---
            const [placements, setPlacements] = useState({
                [CardType.ALGAE]: null, [CardType.COPEPOD]: null, [CardType.KRILL]: null,
                [CardType.HERRING]: null, [CardType.SQUID]: null, [CardType.SHARK]: null,
            });
            const [edges, setEdges] = useState([]); // 儲存箭頭連線 {from, to}
            const [drawingSource, setDrawingSource] = useState(null); // 目前正在畫箭頭的起點
            const [nodeCoords, setNodeCoords] = useState({}); // 儲存各節點的座標
            const [mouseCoords, setMouseCoords] = useState({ x: 0, y: 0 }); // 儲存滑鼠座標以供動態畫線
            const [introFeedback, setIntroFeedback] = useState(null);
            const [introSuccess, setIntroSuccess] = useState(false);
            
            const containerRef = useRef(null);
            const cardRefs = useRef({});

            // 老師與學生狀態
            const [numPlayers, setNumPlayers] = useState(4); 
            const [distributedHands, setDistributedHands] = useState([]); 
            const [isDistributed, setIsDistributed] = useState(false);
            const [currentDeckSize, setCurrentDeckSize] = useState(36);
            const [copyFeedback, setCopyFeedback] = useState("");
            const [ecosystemHand, setEcosystemHand] = useState(countCards([])); 
            const [simulationResult, setSimulationResult] = useState(null);
            const [showResult, setShowResult] = useState(false);

            // ================= 教學模式：連線座標更新與滑鼠追蹤 =================
            const updateCoords = () => {
                if (!containerRef.current) return;
                const containerRect = containerRef.current.getBoundingClientRect();
                const newCoords = {};
                Object.keys(cardRefs.current).forEach(type => {
                    const el = cardRefs.current[type];
                    if (el) {
                        const rect = el.getBoundingClientRect();
                        newCoords[type] = {
                            x: rect.left - containerRect.left + rect.width / 2,
                            y: rect.top - containerRect.top + rect.height / 2,
                        };
                    }
                });
                setNodeCoords(newCoords);
            };

            useEffect(() => {
                if (viewMode !== 'intro') return;
                updateCoords();
                window.addEventListener('resize', updateCoords);
                return () => window.removeEventListener('resize', updateCoords);
            }, [placements, viewMode]);

            const handleMouseMove = (e) => {
                if (drawingSource && containerRef.current) {
                    const rect = containerRef.current.getBoundingClientRect();
                    setMouseCoords({ x: e.clientX - rect.left, y: e.clientY - rect.top });
                }
            };

            // ================= 教學模式：拖拉與點擊邏輯 =================
            const enterIntroMode = () => {
                setPlacements({ [CardType.ALGAE]: null, [CardType.COPEPOD]: null, [CardType.KRILL]: null, [CardType.HERRING]: null, [CardType.SQUID]: null, [CardType.SHARK]: null });
                setEdges([]);
                setDrawingSource(null);
                setIntroFeedback(null);
                setIntroSuccess(false);
                setViewMode('intro');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleDragStart = (e, type) => {
                e.dataTransfer.setData('cardType', type);
                setDrawingSource(null); // 拖拉時取消畫線
            };

            const handleDrop = (e, levelId) => {
                e.preventDefault();
                e.currentTarget.classList.remove('drag-over');
                const type = e.dataTransfer.getData('cardType');
                if (type) {
                    setPlacements(prev => ({ ...prev, [type]: levelId }));
                    // 若被移回原本未放置區，清除與它相關的線
                    if (levelId === null) {
                        setEdges(prev => prev.filter(edge => edge.from !== type && edge.to !== type));
                    }
                    setIntroFeedback(null);
                    setTimeout(updateCoords, 50); // 確保 DOM 渲染後再抓座標
                }
            };

            const handleDragOver = (e) => e.preventDefault();
            const handleDragEnter = (e) => { e.preventDefault(); e.currentTarget.classList.add('drag-over'); };
            const handleDragLeave = (e) => { e.preventDefault(); e.currentTarget.classList.remove('drag-over'); };

            const handleCardClick = (type, e) => {
                e.stopPropagation(); // 避免觸發背景取消畫線的事件
                
                if (!drawingSource && placements[type] === null) {
                    setIntroFeedback({ type: 'error', msg: '請先將生物放置到上方的生態階層中，再來進行連線喔！' });
                    return;
                }

                if (drawingSource === type) {
                    setDrawingSource(null); // 點擊自己則取消
                } else if (drawingSource) {
                    // 完成連線 (檢查是否已存在)
                    const exists = edges.some(edge => edge.from === drawingSource && edge.to === type);
                    if (!exists) setEdges(prev => [...prev, { from: drawingSource, to: type }]);
                    setDrawingSource(null);
                } else {
                    // 開始連線
                    setDrawingSource(type);
                }
            };

            const removeEdge = (index) => {
                setEdges(prev => prev.filter((_, i) => i !== index));
            };

            const verifyFoodWeb = () => {
                // 1. 檢查位置
                if (Object.values(placements).some(p => p === null)) {
                    setIntroFeedback({ type: 'error', msg: '請將所有的生物都拖拉到對應的階層中喔！' });
                    return;
                }

                let isPlacementsCorrect = true;
                Object.keys(placements).forEach(type => {
                    const targetLevel = TROPHIC_LEVELS.find(l => l.id === placements[type]);
                    if (!targetLevel || !targetLevel.expects.includes(type)) isPlacementsCorrect = false;
                });

                if (!isPlacementsCorrect) {
                    setIntroFeedback({ type: 'error', msg: '🤔 生物的階層位置不太對喔，請重新思考！' });
                    setIntroSuccess(false);
                    return;
                }

                // 2. 檢查箭頭連線
                const expectedEdges = [
                    { from: CardType.ALGAE, to: CardType.COPEPOD },
                    { from: CardType.ALGAE, to: CardType.KRILL },
                    { from: CardType.ALGAE, to: CardType.HERRING },
                    { from: CardType.COPEPOD, to: CardType.HERRING },
                    { from: CardType.COPEPOD, to: CardType.SQUID },
                    { from: CardType.KRILL, to: CardType.SQUID },
                    { from: CardType.HERRING, to: CardType.SHARK },
                    { from: CardType.SQUID, to: CardType.SHARK },
                ];

                if (edges.length !== expectedEdges.length) {
                    setIntroFeedback({ type: 'error', msg: `🤔 箭頭數量不對！依照卡牌進食規則，應該要有 ${expectedEdges.length} 條連線，目前有 ${edges.length} 條。` });
                    setIntroSuccess(false);
                    return;
                }

                const isEdgesCorrect = expectedEdges.every(expected => 
                    edges.some(e => e.from === expected.from && e.to === expected.to)
                );

                if (!isEdgesCorrect) {
                    setIntroFeedback({ type: 'error', msg: '🤔 箭頭連線有錯！請確認誰吃誰（箭頭方向代表能量流動：被吃 👉 捕食者）。' });
                    setIntroSuccess(false);
                    return;
                }

                setIntroFeedback({ type: 'success', msg: '🎉 完全正確！你已經完美建構了海洋食物網，準備好進入遊戲對戰了嗎？' });
                setIntroSuccess(true);
            };

            // ================= 老師與學生模式 (與原版相同) =================
            const handleDistribute = () => {
                const fullDeck = generateDeckByPlayers(numPlayers);
                setCurrentDeckSize(fullDeck.length);
                const deck = shuffleDeck(fullDeck);
                const hands = Array.from({ length: numPlayers }, () => []);
                deck.forEach((card, index) => hands[index % numPlayers].push(card));
                setDistributedHands(hands.map(hand => hand.sort()));
                setIsDistributed(true);
            };

            const handleCopyDistribution = async () => { /* ... 保留原本的複製邏輯 ... */ };
            
            const enterStudentMode = () => {
                setEcosystemHand(countCards([]));
                setSimulationResult(null);
                setShowResult(false);
                setViewMode('student');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const adjustHand = (type, delta) => { setEcosystemHand(prev => ({ ...prev, [type]: Math.max(0, prev[type] + delta) })); setShowResult(false); };
            const calculateScore = () => { /* ... 保留原本的計算邏輯 ... */ };

            return (
                <div className="min-h-screen bg-cyan-50 p-4 md:p-8 font-sans text-slate-800">
                    <div className="max-w-5xl mx-auto space-y-6">
                        
                        {/* Header */}
                        <header className="flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-cyan-100">
                            <div>
                                <h1 className="text-3xl font-bold text-cyan-800 flex items-center gap-2 cursor-pointer hover:opacity-80 transition-opacity" onClick={() => setViewMode('home')}>
                                    <Fish className="w-8 h-8" /> 海洋生態食物鏈
                                </h1>
                            </div>
                            {viewMode !== 'home' && (
                                <button onClick={() => setViewMode('home')} className="mt-4 md:mt-0 px-4 py-2 text-sm text-slate-500 hover:bg-slate-100 rounded-lg transition-colors flex items-center gap-2">
                                    <School className="w-4 h-4" /> 回首頁
                                </button>
                            )}
                        </header>

                        {/* ================= 首頁 ================= */}
                        {viewMode === 'home' && (
                            <div className="py-12 animate-fade-in text-center">
                                <h2 className="text-2xl text-slate-600 font-bold mb-10">請選擇您的任務</h2>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-5xl mx-auto px-4">
                                    <button onClick={() => setViewMode('teacher')} className="group relative bg-white p-8 rounded-3xl shadow-md border-2 border-cyan-100 hover:border-cyan-500 hover:shadow-xl transition-all duration-300 flex flex-col items-center gap-4">
                                        <div className="w-16 h-16 bg-cyan-100 rounded-full flex items-center justify-center group-hover:scale-110 transition-transform"><GraduationCap className="w-8 h-8 text-cyan-700" /></div>
                                        <h3 className="text-xl font-bold text-slate-800">我是老師</h3>
                                        <div className="mt-auto pt-4 px-6 py-2 bg-cyan-50 text-cyan-700 rounded-full font-bold text-sm">進入發牌系統</div>
                                    </button>
                                    <button onClick={enterIntroMode} className="group relative bg-white p-8 rounded-3xl shadow-md border-2 border-indigo-100 hover:border-indigo-500 hover:shadow-xl transition-all duration-300 flex flex-col items-center gap-4 transform md:-translate-y-4">
                                        <div className="absolute -top-3 right-4 bg-indigo-500 text-white text-xs font-bold px-3 py-1 rounded-full animate-bounce">學生第一步</div>
                                        <div className="w-20 h-20 bg-indigo-100 rounded-full flex items-center justify-center group-hover:scale-110 transition-transform"><Network className="w-10 h-10 text-indigo-600" /></div>
                                        <h3 className="text-2xl font-bold text-slate-800">食物網教學</h3>
                                        <div className="mt-auto pt-4 w-full"><div className="px-6 py-3 bg-indigo-600 text-white rounded-full font-bold text-sm text-center shadow-lg group-hover:bg-indigo-700 transition-colors">開始情境配對</div></div>
                                    </button>
                                    <button onClick={enterStudentMode} className="group relative bg-white p-8 rounded-3xl shadow-md border-2 border-orange-100 hover:border-orange-500 hover:shadow-xl transition-all duration-300 flex flex-col items-center gap-4">
                                        <div className="w-16 h-16 bg-orange-100 rounded-full flex items-center justify-center group-hover:scale-110 transition-transform"><Swords className="w-8 h-8 text-orange-600" /></div>
                                        <h3 className="text-xl font-bold text-slate-800">戰鬥計算機</h3>
                                        <div className="mt-auto pt-4 px-6 py-2 bg-orange-50 text-orange-700 rounded-full font-bold text-sm">進入學生系統</div>
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* ================= 食物網教學 (Intro Mode) ================= */}
                        {viewMode === 'intro' && (
                            <div className="space-y-6 animate-fade-in" onClick={() => setDrawingSource(null)}>
                                <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-indigo-100">
                                    <div className="text-center max-w-2xl mx-auto mb-6">
                                        <h2 className="text-2xl font-bold text-indigo-800 mb-2">生態情境配對任務</h2>
                                    </div>

                                    {/* 規則提示 */}
                                    <div className="bg-indigo-50 border-l-4 border-indigo-500 p-5 rounded-r-xl mb-6 text-indigo-900 text-sm md:text-base space-y-2 shadow-sm">
                                        <p className="flex items-center gap-2"><strong className="bg-indigo-200 px-2 py-0.5 rounded text-indigo-800">Step 1. 拖拉配對</strong> 將下方的海洋生物拖拉放到對應的「生態階層」中。</p>
                                        <p className="flex items-center gap-2"><strong className="bg-indigo-200 px-2 py-0.5 rounded text-indigo-800">Step 2. 畫出食物網</strong> 點擊<span className="font-bold text-red-500">「被吃」</span>的生物，再點擊<span className="font-bold text-green-600">「捕食者」</span>，畫出能量流動的箭頭！(點擊箭頭中間的 ✕ 可刪除)</p>
                                    </div>

                                    {/* 互動大畫布 */}
                                    <div className="relative bg-slate-50 p-4 md:p-6 rounded-2xl border border-slate-200 overflow-hidden" ref={containerRef} onMouseMove={handleMouseMove}>
                                        
                                        {/* SVG 箭頭繪製層 (放在背景之上，卡牌之下) */}
                                        <svg className="absolute inset-0 w-full h-full pointer-events-none opacity-80" style={{ zIndex: 20 }}>
                                            <defs>
                                                <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                                                    <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1" />
                                                </marker>
                                                <marker id="arrowhead-drawing" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                                                    <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
                                                </marker>
                                            </defs>
                                            
                                            {/* 已建立的連線 */}
                                            {edges.map((edge, idx) => {
                                                const fromCoords = nodeCoords[edge.from];
                                                const toCoords = nodeCoords[edge.to];
                                                if (!fromCoords || !toCoords) return null;
                                                return (
                                                    <line key={idx} x1={fromCoords.x} y1={fromCoords.y} x2={toCoords.x} y2={toCoords.y} stroke="#6366f1" strokeWidth="3.5" markerEnd="url(#arrowhead)" />
                                                );
                                            })}

                                            {/* 正在繪製的線 */}
                                            {drawingSource && nodeCoords[drawingSource] && (
                                                <line x1={nodeCoords[drawingSource].x} y1={nodeCoords[drawingSource].y} x2={mouseCoords.x} y2={mouseCoords.y} stroke="#94a3b8" strokeWidth="3" strokeDasharray="6,6" markerEnd="url(#arrowhead-drawing)" />
                                            )}
                                        </svg>

                                        {/* 刪除連線的按鈕層 */}
                                        <div className="absolute inset-0 pointer-events-none" style={{ zIndex: 30 }}>
                                            {edges.map((edge, idx) => {
                                                const fromCoords = nodeCoords[edge.from];
                                                const toCoords = nodeCoords[edge.to];
                                                if (!fromCoords || !toCoords) return null;
                                                return (
                                                    <button key={idx} onClick={(e) => { e.stopPropagation(); removeEdge(idx); }} className="absolute w-6 h-6 bg-white border-2 border-red-400 text-red-500 font-black rounded-full flex items-center justify-center transform -translate-x-1/2 -translate-y-1/2 pointer-events-auto hover:bg-red-500 hover:text-white hover:scale-110 transition-all shadow-md" style={{ left: (fromCoords.x + toCoords.x)/2, top: (fromCoords.y + toCoords.y)/2, fontSize: '10px' }}>
                                                        ✕
                                                    </button>
                                                );
                                            })}
                                        </div>

                                        {/* 階層放置區 */}
                                        <div className="relative z-10 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                                            {TROPHIC_LEVELS.map(level => (
                                                <div 
                                                    key={level.id}
                                                    onDrop={(e) => handleDrop(e, level.id)}
                                                    onDragOver={handleDragOver} onDragEnter={handleDragEnter} onDragLeave={handleDragLeave}
                                                    className={`flex flex-col rounded-xl border-2 border-dashed ${level.borderColor} ${level.bgColor} transition-all min-h-[140px]`}
                                                >
                                                    <div className={`text-center font-bold py-2 border-b-2 border-dashed ${level.borderColor} ${level.textColor} bg-white/50 rounded-t-lg`}>{level.name}</div>
                                                    <div className="flex-1 p-3 flex flex-wrap content-start gap-2">
                                                        {Object.keys(placements).filter(type => placements[type] === level.id).map(type => (
                                                            <div 
                                                                key={type} ref={el => cardRefs.current[type] = el}
                                                                draggable onDragStart={(e) => handleDragStart(e, type)} onClick={(e) => handleCardClick(type, e)}
                                                                className={`cursor-pointer px-3 py-2 rounded-lg border-2 shadow-sm text-sm font-bold bg-white transition-all hover:-translate-y-1 ${drawingSource === type ? 'ring-4 ring-indigo-500 scale-105 shadow-xl' : ''} ${CARD_INFO[type].color}`}
                                                            >
                                                                {CARD_INFO[type].name}
                                                            </div>
                                                        ))}
                                                        {Object.values(placements).filter(v => v === level.id).length === 0 && (
                                                            <span className="text-slate-400 text-sm w-full text-center mt-4 pointer-events-none">拖拉至此</span>
                                                        )}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>

                                        {/* 待放置生物區 */}
                                        <div className="relative z-10 bg-white/70 backdrop-blur-sm rounded-xl p-4 md:p-6 border border-slate-200">
                                            <h3 className="text-slate-500 font-bold mb-4 text-center pointer-events-none">海洋生物列表 (請將它們拖移到上方)</h3>
                                            <div 
                                                className="flex flex-wrap justify-center gap-3 min-h-[60px]"
                                                onDrop={(e) => handleDrop(e, null)} onDragOver={handleDragOver} onDragEnter={handleDragEnter} onDragLeave={handleDragLeave}
                                            >
                                                {Object.keys(placements).filter(type => placements[type] === null).map(type => (
                                                    <div 
                                                        key={type} ref={el => cardRefs.current[type] = el}
                                                        draggable onDragStart={(e) => handleDragStart(e, type)} onClick={(e) => handleCardClick(type, e)}
                                                        className={`cursor-move px-4 py-3 rounded-xl border-2 shadow-sm font-bold bg-white transition-all hover:scale-105 ${drawingSource === type ? 'ring-4 ring-indigo-500 scale-105' : ''} ${CARD_INFO[type].color}`}
                                                    >
                                                        {CARD_INFO[type].name}
                                                        <span className="block text-xs font-normal opacity-70 mt-1 pointer-events-none">{CARD_INFO[type].desc}</span>
                                                    </div>
                                                ))}
                                                {Object.values(placements).every(v => v !== null) && <div className="text-slate-400 italic flex items-center h-full pointer-events-none">所有生物皆已分配！</div>}
                                            </div>
                                        </div>
                                    </div>

                                    {/* 驗證區 */}
                                    <div className="mt-8 flex flex-col items-center">
                                        {!introSuccess ? (
                                            <button onClick={verifyFoodWeb} className="px-8 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-full shadow-lg transition-all active:scale-95">驗證食物網</button>
                                        ) : (
                                            <button onClick={enterStudentMode} className="px-8 py-3 bg-orange-500 hover:bg-orange-600 text-white font-bold rounded-full shadow-lg transition-all active:scale-95 flex items-center gap-2 animate-bounce"><Swords className="w-5 h-5" /> 開始進入遊戲對戰！</button>
                                        )}

                                        {introFeedback && (
                                            <div className={`mt-4 p-4 rounded-lg border flex items-center gap-2 max-w-lg w-full ${introFeedback.type === 'success' ? 'bg-green-50 border-green-200 text-green-700' : 'bg-red-50 border-red-200 text-red-700'}`}>
                                                {introFeedback.type === 'success' ? <Leaf className="w-5 h-5 shrink-0" /> : <AlertCircle className="w-5 h-5 shrink-0" />}
                                                <span>{introFeedback.msg}</span>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ================= 老師模式與學生計算機在此省略，因長度限制，與上一版本完全相同 ================= */}
                        {/* 這裡僅為避免程式碼過長而簡化示範，請將你原先代碼中的 viewMode === 'teacher' 和 viewMode === 'student' 的區塊完整貼在此處 */}
                        
                        {/* 以下為確保運行順暢的精簡版，請將上一版本的老師與學生區塊直接取代回來即可 */}
                        {viewMode === 'teacher' && (<div className="text-center p-10"><p>請參考上一版代碼，將原本的 teacher 區塊貼回此處</p></div>)}
                        {viewMode === 'student' && (<div className="text-center p-10"><p>請參考上一版代碼，將原本的 student 區塊貼回此處</p></div>)}

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<OceanCardGame />);
    </script>
</body>
</html>
