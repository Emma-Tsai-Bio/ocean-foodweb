<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海洋生態食物鏈</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @keyframes shimmer { 100% { transform: translateX(100%); } }
        .animate-shimmer { animation: shimmer 2s infinite; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        .animate-slide-up { animation: slideUp 0.4s ease-out; }
        .animate-pop-in { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        
        .edge-hit-area { cursor: pointer; }
        .edge-hit-area:hover { stroke: rgba(239, 68, 68, 0.5); }
    </style>
</head>
<body class="bg-cyan-50 text-slate-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // --- 內建圖示元件 ---
        const IconBase = ({ children, className, ...props }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>{children}</svg>;

        const Fish = (props) => <IconBase {...props}><path d="M6.5 12c.94-3.46 4.96-6 8.5-6 3.54 0 6.46 2.31 7.5 5.5-1.04 3.19-3.96 5.5-7.5 5.5-3.54 0-7.56-2.54-8.5-6Z"/><path d="M18 12v.5"/></IconBase>;
        const Utensils = (props) => <IconBase {...props}><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></IconBase>;
        const Activity = (props) => <IconBase {...props}><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></IconBase>;
        const Plus = (props) => <IconBase {...props}><path d="M5 12h14"/><path d="M12 5v14"/></IconBase>;
        const Minus = (props) => <IconBase {...props}><path d="M5 12h14"/></IconBase>;
        const RefreshCw = (props) => <IconBase {...props}><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 21h-5v-5"/></IconBase>;
        const Trophy = (props) => <IconBase {...props}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></IconBase>;
        const Users = (props) => <IconBase {...props}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></IconBase>;
        const Calculator = (props) => <IconBase {...props}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></IconBase>;
        const AlertCircle = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></IconBase>;
        const Copy = (props) => <IconBase {...props}><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></IconBase>;
        const Swords = (props) => <IconBase {...props}><polyline points="14.5 17.5 3 6 3 3 6 3 17.5 14.5"/><line x1="13" x2="19" y1="19" y2="13"/><line x1="16" x2="20" y1="16" y2="20"/><line x1="19" x2="21" y1="21" y2="19"/><polyline points="14.5 6.5 18 3 21 3 21 6 17.5 9.5"/><line x1="5" x2="9" y1="14" y2="10"/><line x1="17" x2="11" y1="11" y2="17"/><line x1="9" x2="7" y1="21" y2="19"/><line x1="11" x2="13" y1="15" y2="13"/></IconBase>;
        const Leaf = (props) => <IconBase {...props}><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.5 1 10-2.45 4-7.5 5.5-9 8Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></IconBase>;
        const ShieldAlert = (props) => <IconBase {...props}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></IconBase>;
        const GraduationCap = (props) => <IconBase {...props}><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></IconBase>;
        const School = (props) => <IconBase {...props}><path d="m4 6 8-4 8 4"/><path d="m18 10 4 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-8l4-2"/><path d="M14 22v-4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v4"/><path d="M18 5v17"/><path d="M6 5v17"/><circle cx="12" cy="9" r="2"/></IconBase>;
        const Network = (props) => <IconBase {...props}><rect x="16" y="16" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/><path d="M5 16v-3a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v3"/><path d="M12 8v4"/></IconBase>;
        const Hand = (props) => <IconBase {...props}><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v2"/><path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v8"/><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/></IconBase>;
        const ArrowUpRight = (props) => <IconBase {...props}><path d="M7 7h10v10"/><path d="M7 17 17 7"/></IconBase>;
        const Crosshair = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"/><line x1="22" x2="18" y1="12" y2="12"/><line x1="6" x2="2" y1="12" y2="12"/><line x1="12" x2="12" y1="6" y2="2"/><line x1="12" x2="12" y1="22" y2="18"/></IconBase>;
        const Ghost = (props) => <IconBase {...props}><path d="M9 10h.01"/><path d="M15 10h.01"/><path d="M12 2a8 8 0 0 0-8 8v12l3-3 2.5 2.5L12 19l2.5 2.5L17 19l3 3V10a8 8 0 0 0-8-8z"/></IconBase>;
        const UserCircle = (props) => <IconBase {...props}><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 0 0-16 0"/></IconBase>;

        // --- 設定檔與常數 ---
        const CardType = { ALGAE: 'algae', COPEPOD: 'copepod', KRILL: 'krill', HERRING: 'herring', SQUID: 'squid', SHARK: 'shark' };

        const BASE_RATIO_CONFIG = [
            { type: CardType.ALGAE, ratio: 10/36, name: '浮游藻類', score: 1, color: 'bg-green-50 border-green-500 text-green-800', desc: '自營生物 (免吃)' },
            { type: CardType.COPEPOD, ratio: 7/36, name: '劍水蚤', score: 2, color: 'bg-yellow-50 border-yellow-500 text-yellow-800', desc: '需 2 藻類' },
            { type: CardType.KRILL, ratio: 7/36, name: '磷蝦', score: 2, color: 'bg-orange-50 border-orange-500 text-orange-800', desc: '需 2 藻類' },
            { type: CardType.HERRING, ratio: 6/36, name: '鯡魚', score: 3, color: 'bg-blue-50 border-blue-500 text-blue-800', desc: '需 3 藻類+1 劍水蚤' },
            { type: CardType.SQUID, ratio: 4/36, name: '烏賊', score: 3, color: 'bg-purple-50 border-purple-500 text-purple-800', desc: '需 2 磷蝦+1 劍水蚤' },
            { type: CardType.SHARK, ratio: 2/36, name: '鯊魚', score: 4, color: 'bg-red-50 border-red-500 text-red-800', desc: '需 2 鯡魚+2 烏賊' },
        ];
        
        const CARD_INFO = BASE_RATIO_CONFIG.reduce((acc, card) => { acc[card.type] = card; return acc; }, {});

        const EATS = {
            [CardType.ALGAE]: [],
            [CardType.COPEPOD]: [CardType.ALGAE],
            [CardType.KRILL]: [CardType.ALGAE],
            [CardType.HERRING]: [CardType.ALGAE, CardType.COPEPOD],
            [CardType.SQUID]: [CardType.KRILL, CardType.COPEPOD],
            [CardType.SHARK]: [CardType.HERRING, CardType.SQUID]
        };

        const ECOLOGICAL_ROLES = [
            { id: 'producer', label: '🌿 生產' }, { id: 'primary', label: '🐛 初級' },
            { id: 'secondary', label: '🐟 次級' }, { id: 'tertiary', label: '🦈 三級' }
        ];

        // --- 輔助函式 ---
        const shuffleDeck = (deck) => {
            const newDeck = [...deck];
            for (let i = newDeck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newDeck[i], newDeck[j]] = [newDeck[j], newDeck[i]];
            }
            return newDeck;
        };
        const countCards = (cardList) => {
            const counts = { [CardType.ALGAE]: 0, [CardType.COPEPOD]: 0, [CardType.KRILL]: 0, [CardType.HERRING]: 0, [CardType.SQUID]: 0, [CardType.SHARK]: 0 };
            cardList.forEach(type => { if (counts[type] !== undefined) counts[type]++; });
            return counts;
        };

        // --- 主程式元件 ---
        function OceanCardGame() {
            // ================= 路由狀態 =================
            const [viewMode, setViewMode] = useState('home');
            const [hasPassedIntro, setHasPassedIntro] = useState(false); 
            
            // ================= 1. Intro (食物網教學) 狀態 =================
            const [introPhase, setIntroPhase] = useState(1);
            const initialPositions = {
                [CardType.ALGAE]: { x: 15, y: 80 }, [CardType.COPEPOD]: { x: 35, y: 80 },
                [CardType.KRILL]: { x: 55, y: 80 }, [CardType.HERRING]: { x: 25, y: 50 },
                [CardType.SQUID]: { x: 45, y: 50 }, [CardType.SHARK]: { x: 75, y: 80 },
            };
            const [positions, setPositions] = useState(initialPositions);
            const [edges, setEdges] = useState([]);
            const [labels, setLabels] = useState({ [CardType.ALGAE]: [], [CardType.COPEPOD]: [], [CardType.KRILL]: [], [CardType.HERRING]: [], [CardType.SQUID]: [], [CardType.SHARK]: [] });
            const [interactionMode, setInteractionMode] = useState('move'); 
            const [dragNode, setDragNode] = useState(null);
            const [drawingSource, setDrawingSource] = useState(null);
            const [mouseCoords, setMouseCoords] = useState({ x: 0, y: 0 }); 
            const [introFeedback, setIntroFeedback] = useState(null);
            const containerRef = useRef(null);
            const [containerSize, setContainerSize] = useState({ width: 0, height: 0 });

            useEffect(() => {
                if (viewMode !== 'intro' && viewMode !== 'student_team_personal') return;
                const targetRef = viewMode === 'intro' ? containerRef.current : null;
                if (!targetRef) return;
                
                const observer = new ResizeObserver(entries => {
                    if (entries[0]) setContainerSize({ width: entries[0].contentRect.width, height: entries[0].contentRect.height });
                });
                observer.observe(targetRef);
                return () => observer.disconnect();
            }, [viewMode, introPhase]);

            // ================= 2. Teacher (發牌) 狀態 =================
            const [numPlayers, setNumPlayers] = useState(4); 
            const [numGroups, setNumGroups] = useState(6);
            const [groupSize, setGroupSize] = useState(4);
            const [distributedHands, setDistributedHands] = useState([]); 
            const [distributedRoles, setDistributedRoles] = useState([]); 
            const [isDistributed, setIsDistributed] = useState(false);
            const [copyFeedback, setCopyFeedback] = useState("");

            // ================= 3. Student (個人對戰面板) 狀態 =================
            const [myRole, setMyRole] = useState(null);
            const [myCount, setMyCount] = useState(1); // 記錄自己有幾隻 (繁衍用)
            const [isDead, setIsDead] = useState(false);
            const [myInventory, setMyInventory] = useState(countCards([]));
            const [encounterTarget, setEncounterTarget] = useState(null);
            const [sameWinPhase, setSameWinPhase] = useState(false); // 記錄是否同類猜拳獲勝
            const [showMiniWeb, setShowMiniWeb] = useState(false);
            const [personalResult, setPersonalResult] = useState(null); // 個人結算結果
            
            // 彈出視窗狀態
            const [popupInfo, setPopupInfo] = useState({ show: false, title: '', msg: '', action: null });

            // ================= 4. 共用狀態 =================
            const [ecosystemHand, setEcosystemHand] = useState(countCards([])); 
            const [simulationResult, setSimulationResult] = useState(null);
            const [showResult, setShowResult] = useState(false);

            // --- 導覽邏輯 ---
            const handleStudentEntry = () => {
                if(hasPassedIntro) setViewMode('student_home');
                else enterIntroMode();
            };

            // --- (1) 食物網教學邏輯 ---
            const enterIntroMode = () => {
                setIntroPhase(1); setPositions(initialPositions); setEdges([]);
                setLabels({ [CardType.ALGAE]: [], [CardType.COPEPOD]: [], [CardType.KRILL]: [], [CardType.HERRING]: [], [CardType.SQUID]: [], [CardType.SHARK]: [] });
                setInteractionMode('move'); setDrawingSource(null); setIntroFeedback(null);
                setViewMode('intro'); window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleIntroPointerDown = (e, type) => {
                if (interactionMode === 'move') { 
                    e.target.setPointerCapture(e.pointerId); 
                    setDragNode(type); 
                    e.stopPropagation(); 
                }
                else if (interactionMode === 'draw' && introPhase === 1) {
                    if (!drawingSource) { 
                        setDrawingSource(type); 
                        setMouseCoords({ x: positions[type].x, y: positions[type].y }); 
                    } else {
                        if (drawingSource !== type && !edges.some(ed => ed.from === drawingSource && ed.to === type)) {
                            setEdges([...edges, { from: drawingSource, to: type }]);
                        }
                        setDrawingSource(null);
                    }
                    e.stopPropagation();
                }
            };

            const handleIntroPointerMove = (e) => {
                if (!containerRef.current || containerSize.width === 0) return;
                const rect = containerRef.current.getBoundingClientRect();
                const pctX = (Math.max(0, Math.min(rect.width, e.clientX - rect.left)) / rect.width) * 100;
                const pctY = (Math.max(0, Math.min(rect.height, e.clientY - rect.top)) / rect.height) * 100;
                if (dragNode) setPositions(prev => ({ ...prev, [dragNode]: { x: pctX, y: pctY } }));
                else if (drawingSource) setMouseCoords({ x: pctX, y: pctY });
            };
            
            const handleIntroPointerUp = (e, type) => {
                if (interactionMode === 'move' && dragNode === type) { 
                    setDragNode(null); 
                    if (e.target.releasePointerCapture) e.target.releasePointerCapture(e.pointerId); 
                    e.stopPropagation(); 
                }
                else if (interactionMode === 'draw' && introPhase === 1) {
                    let targetType = type;

                    // 針對 iPad 等觸控裝置：找出手指放開時，底下真實的卡片是誰
                    if (e.pointerType === 'touch' || e.pointerType === 'pen') {
                        const elem = document.elementFromPoint(e.clientX, e.clientY);
                        const cardElem = elem ? elem.closest('[data-card-type]') : null;
                        if (cardElem) {
                            targetType = cardElem.getAttribute('data-card-type');
                        } else {
                            targetType = null; 
                        }
                    }

                    // 只要有起點、有合法的終點、且不是連到自己，就成功畫線！
                    if (drawingSource && targetType && drawingSource !== targetType && !edges.some(ed => ed.from === drawingSource && ed.to === targetType)) { 
                        setEdges([...edges, { from: drawingSource, to: targetType }]); 
                        setDrawingSource(null); // 連線成功，清空畫線狀態
                    } 
                    
                    e.stopPropagation(); 
                }
            };

            const handleContainerPointerUp = () => {
                if (drawingSource) setDrawingSource(null);
            };

            const toggleLabel = (type, roleId, e) => {
                e.stopPropagation(); 
                setLabels(prev => {
                    const currentLabels = prev[type];
                    if (currentLabels.includes(roleId)) return { ...prev, [type]: currentLabels.filter(id => id !== roleId) };
                    else return { ...prev, [type]: [...currentLabels, roleId] };
                });
            };

            const renderIntroEdges = (isReadOnly = false) => {
                const cSize = isReadOnly ? {width: 800, height: 600} : containerSize; 
                if (cSize.width === 0 && !isReadOnly) return null;

                return edges.map((edge, idx) => {
                    const fromPos = positions[edge.from]; const toPos = positions[edge.to];
                    if (!fromPos || !toPos) return null;
                    const x1 = (fromPos.x / 100) * cSize.width; const y1 = (fromPos.y / 100) * cSize.height;
                    const x2 = (toPos.x / 100) * cSize.width; const y2 = (toPos.y / 100) * cSize.height;
                    const dx = x2 - x1; const dy = y2 - y1; const dist = Math.hypot(dx, dy);
                    if (dist < 10) return null;
                    const sx = x1 + (dx / dist) * 65; const sy = y1 + (dy / dist) * 65; 
                    const ex = x2 - (dx / dist) * (introPhase >= 2 || isReadOnly ? 85 : 80); const ey = y2 - (dy / dist) * (introPhase >= 2 || isReadOnly ? 85 : 80);
                    return (
                        <g key={idx}>
                            {!isReadOnly && introPhase === 1 && <line x1={sx} y1={sy} x2={ex} y2={ey} stroke="transparent" strokeWidth="26" className="edge-hit-area transition-all duration-300" style={{ pointerEvents: 'stroke' }} onClick={(e) => { e.stopPropagation(); setEdges(edges.filter((_, i) => i !== idx)); }} />}
                            <line x1={sx} y1={sy} x2={ex} y2={ey} stroke="#6366f1" strokeWidth="4" markerEnd="url(#arrowhead)" style={{ pointerEvents: 'none' }} />
                        </g>
                    );
                });
            };

            const renderIntroDrawingEdge = () => {
                if (!drawingSource || !positions[drawingSource] || containerSize.width === 0) return null;
                const fromPos = positions[drawingSource];
                const x1 = (fromPos.x / 100) * containerSize.width; const y1 = (fromPos.y / 100) * containerSize.height;
                const x2 = (mouseCoords.x / 100) * containerSize.width; const y2 = (mouseCoords.y / 100) * containerSize.height;
                const dx = x2 - x1; const dy = y2 - y1; const dist = Math.hypot(dx, dy);
                if (dist < 10) return null;
                const sx = x1 + (dx / dist) * Math.min(60, dist/2); const sy = y1 + (dy / dist) * Math.min(60, dist/2);
                return <line x1={sx} y1={sy} x2={x2} y2={y2} stroke="#94a3b8" strokeWidth="3" strokeDasharray="6,6" markerEnd="url(#arrowhead-drawing)" style={{ pointerEvents: 'none' }} />;
            };

            const verifyPhase1 = () => {
                const expected = [{ from: CardType.ALGAE, to: CardType.COPEPOD }, { from: CardType.ALGAE, to: CardType.KRILL }, { from: CardType.ALGAE, to: CardType.HERRING }, { from: CardType.COPEPOD, to: CardType.HERRING }, { from: CardType.COPEPOD, to: CardType.SQUID }, { from: CardType.KRILL, to: CardType.SQUID }, { from: CardType.HERRING, to: CardType.SHARK }, { from: CardType.SQUID, to: CardType.SHARK }];
                if (edges.length !== expected.length) { setIntroFeedback({ type: 'error', msg: `🤔 箭頭數量不對！應該要有 ${expected.length} 條連線，目前有 ${edges.length} 條。` }); return; }
                if (!expected.every(ex => edges.some(e => e.from === ex.from && e.to === ex.to))) { setIntroFeedback({ type: 'error', msg: '🤔 連線有錯！請重新確認誰吃誰。\n(💡 提示：箭頭方向代表「能量流動」的方向：被吃 👉 捕食者。)' }); return; }
                setIntroPhase(2); setInteractionMode('move'); setIntroFeedback({ type: 'success', msg: '🎉 食物網建構正確！現在請透過卡片下方的按鈕，標註每隻生物的「生態階層」。' });
            };

            const verifyPhase2 = () => {
                const expectedLabels = { [CardType.ALGAE]: ['producer'], [CardType.COPEPOD]: ['primary'], [CardType.KRILL]: ['primary'], [CardType.HERRING]: ['primary', 'secondary'], [CardType.SQUID]: ['secondary'], [CardType.SHARK]: ['secondary', 'tertiary'] };
                let emptyCards = []; let wrongCards = [];
                Object.keys(expectedLabels).forEach(type => {
                    if (labels[type].length === 0) emptyCards.push(CARD_INFO[type].name);
                    else {
                        const isCorrect = expectedLabels[type].length === labels[type].length && expectedLabels[type].every(val => labels[type].includes(val));
                        if (!isCorrect) wrongCards.push(CARD_INFO[type].name);
                    }
                });
                if (emptyCards.length > 0) { setIntroFeedback({ type: 'error', msg: `請為以下生物選擇至少一個生態階層：${emptyCards.join(', ')}` }); return; }
                if (wrongCards.length > 0) { setIntroFeedback({ type: 'error', msg: `🤔 以下生物的階層標註有誤喔，請重新嘗試：${wrongCards.join(', ')}！\n(💡 提示：請觀察你連好的食物網，看看牠吃了誰！如果食物來源跨越不同階層，記得要「複選」喔！)` }); return; }
                setIntroPhase(3); setIntroFeedback({ type: 'success', msg: '🎉 任務全數通關！你已獲得進入系統的權限！' });
            };

            const completeIntro = () => {
                setHasPassedIntro(true);
                setViewMode('student_home');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            // --- 加減卡牌數量處理 (個人計算機用) ---
            const adjustHand = (type, amount) => {
                setEcosystemHand(prev => ({
                    ...prev,
                    [type]: Math.max(0, (prev[type] || 0) + amount)
                }));
            };

            // --- (2) 老師發牌邏輯 ---
            const handleDistributeIndividual = () => {
                const totalCards = numPlayers * 5; let deck = [];
                BASE_RATIO_CONFIG.forEach(({ type, ratio }) => {
                    for (let i = 0; i < Math.round(totalCards * ratio); i++) deck.push(type);
                });
                while (deck.length < totalCards) deck.push(CardType.ALGAE);
                while (deck.length > totalCards) deck.pop();
                deck = shuffleDeck(deck);
                
                const hands = Array.from({ length: numPlayers }, () => []);
                deck.forEach((card, index) => hands[index % numPlayers].push(card));
                setDistributedHands(hands.map(hand => hand.sort())); 
                setIsDistributed(true);
            };

            const handleDistributeTeam = () => {
                const allTypes = [CardType.ALGAE, CardType.COPEPOD, CardType.KRILL, CardType.HERRING, CardType.SQUID, CardType.SHARK];
                let groups = [];
                for(let i=0; i<numGroups; i++) {
                    let shuffled = shuffleDeck(allTypes);
                    groups.push(shuffled.slice(0, groupSize));
                }
                setDistributedRoles(groups);
                setIsDistributed(true);
            };

            const handleCopyDistribution = async (mode) => {
                let text = ``;
                if(mode === 'individual') {
                    text = `🌊 海洋生態發牌結果 (總人數: ${numPlayers})\n\n`;
                    distributedHands.forEach((hand, idx) => {
                        const counts = countCards(hand); let handStr = [];
                        Object.keys(counts).forEach(type => { if (counts[type] > 0) handStr.push(`${CARD_INFO[type].name}x${counts[type]}`); });
                        text += `👤 玩家 ${idx+1}: ${handStr.join(', ') || '無'}\n`;
                    });
                } else {
                    text = `🌊 海洋生態團隊戰發牌 (總組數: ${numGroups}, 每組 ${groupSize} 人)\n\n`;
                    distributedRoles.forEach((group, idx) => {
                        text += `👥 第 ${idx+1} 組: ${group.map(r => CARD_INFO[r].name).join(', ')}\n`;
                    });
                }

                if (navigator.clipboard && navigator.clipboard.writeText) { await navigator.clipboard.writeText(text); setCopyFeedback("已複製！"); } 
                else { setCopyFeedback("複製失敗"); }
                setTimeout(() => setCopyFeedback(""), 2000);
            };

            // --- (3) 學生對戰邏輯 ---
            const getEncounterRelation = (me, target) => {
                if (me === target) return 'SAME';
                if (EATS[me].includes(target)) return 'PREDATOR';
                if (EATS[target].includes(me)) return 'PREY';
                return 'NONE';
            };

            const handleCombatResult = (resultType, relation, target) => {
                let title = ''; let msg = ''; let action = null;

                if (relation === 'PREDATOR') {
                    if (resultType === 'win') {
                        title = '🎉 捕食成功！';
                        msg = `你成功吃掉了 ${CARD_INFO[target].name}，背包獲得 1 張戰利品！`;
                        action = () => setMyInventory(prev=>({...prev, [target]: prev[target]+1}));
                    } else {
                        title = '💨 獵物逃跑了';
                        msg = `哎呀！${CARD_INFO[target].name} 從你手中溜走了，請尋找下一個目標！`;
                    }
                } else if (relation === 'PREY') {
                    if (resultType === 'win') {
                        title = '💨 逃跑成功！';
                        msg = `好險！你成功躲過了 ${CARD_INFO[target].name} 的攻擊！`;
                    } else {
                        if (myCount > 1) {
                            title = '⚠️ 痛失同伴，資源掉落！';
                            msg = `你的一隻分身被 ${CARD_INFO[target].name} 吃掉了！\n而且在慌亂逃跑時，你隨機遺失了一半的背包資源！`;
                            action = () => {
                                setMyCount(prev => prev - 1);
                                setMyInventory(prev => {
                                    let items = [];
                                    Object.keys(prev).forEach(k => { for(let i=0; i<prev[k]; i++) items.push(k); });
                                    let keepCount = Math.ceil(items.length / 2);
                                    let keptItems = shuffleDeck(items).slice(0, keepCount);
                                    return countCards(keptItems);
                                });
                            };
                        } else {
                            title = '💀 全軍覆沒！';
                            msg = `你最後的本體被 ${CARD_INFO[target].name} 吃掉了！你將失去所有戰利品並進入死亡狀態。`;
                            action = () => { setIsDead(true); setMyCount(0); setMyInventory(countCards([])); };
                        }
                    }
                } else if (relation === 'SAME') {
                    if (resultType === 'win_clone') {
                        title = '🧬 製造分身成功！';
                        msg = `你的族群擴大了！獲得一隻虛擬分身！\n(⚠️ 注意：結算時你需要消耗雙倍的食物喔！)`;
                        action = () => setMyCount(prev => prev + 1);
                    } else if (resultType === 'win_revive') {
                        title = '✨ 救援成功！';
                        msg = `請前往講台死亡區，帶領一名陣亡的隊友重新加入遊戲！\n(💡 提醒：被復活的隊友必須設定與你相同的生物角色喔！)`;
                        action = null; 
                    } else {
                        title = '❌ 猜拳失敗';
                        msg = `猜輸了，繼續加油尋找下一個目標！`;
                    }
                }

                setPopupInfo({ show: true, title, msg, action });
            };

            const closePopup = () => {
                if (popupInfo.action) popupInfo.action();
                setPopupInfo({ show: false, title: '', msg: '', action: null });
                setEncounterTarget(null);
            };

            // --- (4) 結算邏輯 ---
            const calculateScoreOld = () => {
                let foodPool = { ...ecosystemHand }; let score = 0; let logs = []; 
                let details = {
                    [CardType.SHARK]: { scoring: 0, starved: 0 }, [CardType.HERRING]: { scoring: 0, starved: 0, eaten: 0 },
                    [CardType.SQUID]: { scoring: 0, starved: 0, eaten: 0 }, [CardType.COPEPOD]: { scoring: 0, starved: 0, eaten: 0 },
                    [CardType.KRILL]: { scoring: 0, starved: 0, eaten: 0 }, [CardType.ALGAE]: { scoring: 0, starved: 0, eaten: 0 },
                };
                const addLog = (msg, type = 'info') => logs.push({ msg, type });
                addLog("--- 開始生態結算 (食物網推演) ---", 'header');
                
                for (let i = 0; i < ecosystemHand[CardType.SHARK]; i++) {
                    if (foodPool[CardType.HERRING] >= 2 && foodPool[CardType.SQUID] >= 2) {
                        details[CardType.SHARK].scoring++; foodPool[CardType.HERRING] -= 2; foodPool[CardType.SQUID] -= 2;
                        details[CardType.HERRING].eaten += 2; details[CardType.SQUID].eaten += 2; addLog(`✅ 鯊魚 #${i+1} 捕食成功`, 'success');
                    } else { details[CardType.SHARK].starved++; addLog(`💀 鯊魚 #${i+1} 食物不足餓死`, 'fail'); }
                }
                for (let i = 0; i < ecosystemHand[CardType.HERRING]; i++) {
                    if (foodPool[CardType.ALGAE] >= 3 && foodPool[CardType.COPEPOD] >= 1) {
                        details[CardType.HERRING].scoring++; foodPool[CardType.ALGAE] -= 3; foodPool[CardType.COPEPOD] -= 1;
                        details[CardType.ALGAE].eaten += 3; details[CardType.COPEPOD].eaten += 1;
                    } else { details[CardType.HERRING].starved++; }
                }
                for (let i = 0; i < ecosystemHand[CardType.SQUID]; i++) {
                    if (foodPool[CardType.KRILL] >= 2 && foodPool[CardType.COPEPOD] >= 1) {
                        details[CardType.SQUID].scoring++; foodPool[CardType.KRILL] -= 2; foodPool[CardType.COPEPOD] -= 1;
                        details[CardType.KRILL].eaten += 2; details[CardType.COPEPOD].eaten += 1;
                    } else { details[CardType.SQUID].starved++; }
                }
                for (let i = 0; i < ecosystemHand[CardType.COPEPOD]; i++) {
                    if (foodPool[CardType.ALGAE] >= 2) { details[CardType.COPEPOD].scoring++; foodPool[CardType.ALGAE] -= 2; details[CardType.ALGAE].eaten += 2;
                    } else { details[CardType.COPEPOD].starved++; }
                }
                for (let i = 0; i < ecosystemHand[CardType.KRILL]; i++) {
                    if (foodPool[CardType.ALGAE] >= 2) { details[CardType.KRILL].scoring++; foodPool[CardType.ALGAE] -= 2; details[CardType.ALGAE].eaten += 2;
                    } else { details[CardType.KRILL].starved++; }
                }
                details[CardType.ALGAE].scoring = ecosystemHand[CardType.ALGAE];
                Object.keys(details).forEach(type => { score += details[type].scoring * CARD_INFO[type].score; });
                setSimulationResult({ score, details, logs }); setShowResult(true);
                setTimeout(() => { document.getElementById('results-section')?.scrollIntoView({ behavior: 'smooth' }); }, 100);
            };

            const calculatePersonalScore = () => {
                if (isDead || myCount === 0) {
                    setPersonalResult({ fedCount: 0, starvedCount: 0, score: 0 });
                    return;
                }

                let foodPool = { ...myInventory };
                let fedCount = 0;
                
                const reqs = {
                    [CardType.SHARK]: [{type: CardType.HERRING, count: 2}, {type: CardType.SQUID, count: 2}],
                    [CardType.HERRING]: [{type: CardType.ALGAE, count: 3}, {type: CardType.COPEPOD, count: 1}],
                    [CardType.SQUID]: [{type: CardType.KRILL, count: 2}, {type: CardType.COPEPOD, count: 1}],
                    [CardType.COPEPOD]: [{type: CardType.ALGAE, count: 2}],
                    [CardType.KRILL]: [{type: CardType.ALGAE, count: 2}],
                    [CardType.ALGAE]: [] 
                };

                const myReq = reqs[myRole];

                for (let i = 0; i < myCount; i++) {
                    let canFeed = true;
                    myReq.forEach(r => {
                        if ((foodPool[r.type] || 0) < r.count) canFeed = false;
                    });

                    if (canFeed) {
                        fedCount++;
                        myReq.forEach(r => { foodPool[r.type] -= r.count; });
                    }
                }

                let score = fedCount * CARD_INFO[myRole].score;
                setPersonalResult({ fedCount, starvedCount: myCount - fedCount, score });
            };

            const goToCheckout = () => {
                calculatePersonalScore();
                setViewMode('student_team_checkout');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            return (
                <div className="min-h-screen bg-cyan-50 p-4 md:p-8 font-sans text-slate-800">
                    
                    {/* 全局共用彈出視窗 Popup */}
                    {popupInfo.show && (
                        <div className="fixed inset-0 bg-slate-900/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in">
                            <div className="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl animate-pop-in text-center border-4 border-white">
                                <h3 className="text-2xl font-black text-slate-800 mb-4">{popupInfo.title}</h3>
                                <p className="text-slate-600 font-medium mb-8 text-lg whitespace-pre-line">{popupInfo.msg}</p>
                                <button onClick={closePopup} className="w-full py-4 bg-slate-800 hover:bg-slate-900 text-white font-bold rounded-xl shadow-lg transition-all active:scale-95 text-lg">
                                    確定
                                </button>
                            </div>
                        </div>
                    )}

                    <div className="max-w-5xl mx-auto space-y-6 relative">
                        
                        <header className="flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-cyan-100">
                            <div>
                                <h1 className="text-3xl font-bold text-cyan-800 flex items-center gap-2 cursor-pointer hover:opacity-80 transition-opacity" onClick={() => {setViewMode('home'); setShowResult(false);}}>
                                    <Fish className="w-8 h-8" /> 海洋生態食物鏈
                                </h1>
                            </div>
                            {viewMode !== 'home' && (
                                <button onClick={() => {setViewMode('home'); setShowResult(false);}} className="mt-4 md:mt-0 px-4 py-2 text-sm text-slate-500 hover:bg-slate-100 rounded-lg transition-colors flex items-center gap-2">
                                    <School className="w-4 h-4" /> 回首頁
                                </button>
                            )}
                        </header>

                        {/* ================= 首頁 ================= */}
                        {viewMode === 'home' && (
                            <div className="py-20 animate-fade-in text-center max-w-2xl mx-auto">
                                <h2 className="text-3xl text-slate-600 font-bold mb-12">請選擇您的身分</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <button onClick={() => setViewMode('teacher_home')} className="bg-white p-10 rounded-3xl shadow-md border-2 border-cyan-100 hover:border-cyan-500 hover:shadow-xl transition-all flex flex-col items-center gap-4 group">
                                        <div className="w-24 h-24 bg-cyan-100 rounded-full flex items-center justify-center group-hover:scale-110 transition-transform"><GraduationCap className="w-12 h-12 text-cyan-700" /></div>
                                        <h3 className="font-bold text-2xl text-slate-800">我是老師</h3>
                                        <p className="text-slate-500 text-sm">進行發牌與遊戲設定</p>
                                    </button>
                                    <button onClick={handleStudentEntry} className="bg-white p-10 rounded-3xl shadow-md border-2 border-indigo-100 hover:border-indigo-500 hover:shadow-xl transition-all flex flex-col items-center gap-4 group">
                                        <div className="w-24 h-24 bg-indigo-100 rounded-full flex items-center justify-center group-hover:scale-110 transition-transform"><UserCircle className="w-12 h-12 text-indigo-600" /></div>
                                        <h3 className="font-bold text-2xl text-slate-800">我是學生</h3>
                                        <p className="text-slate-500 text-sm">進入闖關與對戰系統</p>
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* ================= 老師大廳 ================= */}
                        {viewMode === 'teacher_home' && (
                            <div className="py-12 animate-fade-in text-center max-w-3xl mx-auto">
                                <h2 className="text-2xl text-slate-600 font-bold mb-8">選擇發牌模式</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <button onClick={() => {setViewMode('teacher_team'); setIsDistributed(false);}} className="bg-white p-8 rounded-3xl shadow-sm border-2 border-emerald-100 hover:border-emerald-500 hover:shadow-md transition-all flex flex-col items-center gap-4">
                                        <div className="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center"><Users className="w-8 h-8 text-emerald-600" /></div>
                                        <h3 className="font-bold text-xl text-slate-800">團隊戰發牌</h3>
                                        <p className="text-slate-500 text-sm font-medium">不完美生態系，跨組生存戰</p>
                                    </button>
                                    <button onClick={() => {setViewMode('teacher_individual'); setIsDistributed(false);}} className="bg-white p-8 rounded-3xl shadow-sm border-2 border-cyan-100 hover:border-cyan-500 hover:shadow-md transition-all flex flex-col items-center gap-4">
                                        <div className="w-16 h-16 bg-cyan-100 rounded-full flex items-center justify-center"><Activity className="w-8 h-8 text-cyan-600" /></div>
                                        <h3 className="font-bold text-xl text-slate-800">個人戰發牌</h3>
                                        <p className="text-slate-500 text-sm font-medium">每人分配 5 張手牌</p>
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* ================= 老師：團隊戰發牌 ================= */}
                        {viewMode === 'teacher_team' && (
                            <div className="bg-white p-8 rounded-2xl shadow-sm border border-emerald-200 animate-fade-in">
                                <h2 className="text-2xl font-bold text-emerald-800 mb-6 flex items-center gap-2"><Users className="w-6 h-6"/> 團隊戰發牌 (微型生態系)</h2>
                                <div className="flex flex-col md:flex-row items-end gap-6 mb-8">
                                    <div className="flex-1 w-full">
                                        <label className="block text-sm font-bold text-slate-700 mb-2">總組數</label>
                                        <input type="number" min="1" value={numGroups} onChange={(e) => setNumGroups(Math.max(1, parseInt(e.target.value)||1))} className="w-full text-xl font-bold px-4 py-3 rounded-xl border-2 border-slate-200 focus:border-emerald-500 outline-none" />
                                    </div>
                                    <div className="flex-1 w-full">
                                        <label className="block text-sm font-bold text-slate-700 mb-2">每組人數</label>
                                        <input type="number" min="1" max="6" value={groupSize} onChange={(e) => setGroupSize(Math.max(1, Math.min(6, parseInt(e.target.value)||1)))} className="w-full text-xl font-bold px-4 py-3 rounded-xl border-2 border-slate-200 focus:border-emerald-500 outline-none" />
                                    </div>
                                    <button onClick={handleDistributeTeam} className="px-8 py-4 bg-emerald-600 hover:bg-emerald-700 text-white text-lg font-bold rounded-xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2 h-[56px]"><RefreshCw className="w-5 h-5" /> 系統分配</button>
                                </div>

                                {isDistributed && (
                                    <div className="space-y-6">
                                        <h3 className="text-xl font-bold text-slate-700 border-b pb-2 flex justify-between items-center">
                                            <span>各組發牌結果</span>
                                            <button onClick={()=>handleCopyDistribution('team')} className="flex items-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-lg text-sm font-bold transition-colors">
                                                {copyFeedback ? <span className="text-green-600">{copyFeedback}</span> : <><Copy className="w-4 h-4"/> 複製結果</>}
                                            </button>
                                        </h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                            {distributedRoles.map((group, idx) => (
                                                <div key={idx} className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                                                    <h4 className="font-bold text-slate-800 mb-2">第 {idx+1} 組</h4>
                                                    <div className="flex flex-wrap gap-2">
                                                        {group.map((role, rIdx) => (
                                                            <span key={rIdx} className={`px-2 py-1 rounded text-sm font-bold ${CARD_INFO[role].color}`}>{CARD_INFO[role].name}</span>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ================= 老師：個人戰發牌 ================= */}
                        {viewMode === 'teacher_individual' && (
                            <div className="bg-white p-8 rounded-2xl shadow-sm border border-cyan-200 animate-fade-in">
                                <h2 className="text-2xl font-bold text-cyan-800 mb-6 flex items-center gap-2"><Activity className="w-6 h-6"/> 個人戰發牌 (1人5手牌)</h2>
                                <div className="flex flex-col md:flex-row items-end gap-6 mb-8">
                                    <div className="flex-1 w-full">
                                        <label className="block text-lg font-bold text-slate-700 mb-2">請輸入「學生總人數」</label>
                                        <div className="flex items-center gap-4">
                                            <input type="number" min="1" max="100" value={numPlayers} onChange={(e) => setNumPlayers(Math.max(1, Math.min(100, parseInt(e.target.value)||1)))} className="w-full text-3xl font-bold text-center px-4 py-4 rounded-xl border-2 border-slate-200 focus:border-cyan-500 outline-none" />
                                            <div className="text-sm text-slate-500 whitespace-nowrap">發出: <span className="font-bold text-cyan-600 text-lg">{numPlayers * 5}</span> 張</div>
                                        </div>
                                    </div>
                                    <button onClick={handleDistributeIndividual} className="px-8 py-4 bg-cyan-600 hover:bg-cyan-700 text-white text-xl font-bold rounded-xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2"><RefreshCw className="w-6 h-6" /> 亂數發牌</button>
                                </div>

                                {isDistributed && (
                                    <div className="space-y-6">
                                        <h3 className="text-xl font-bold text-slate-700 border-b pb-2 flex justify-between items-center">
                                            <span>分配結果</span>
                                            <button onClick={()=>handleCopyDistribution('individual')} className="flex items-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-lg text-sm font-bold transition-colors">
                                                {copyFeedback ? <span className="text-green-600">{copyFeedback}</span> : <><Copy className="w-4 h-4"/> 複製結果</>}
                                            </button>
                                        </h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                            {distributedHands.map((hand, idx) => {
                                                const counts = countCards(hand);
                                                return (
                                                    <div key={idx} className="bg-slate-50 p-5 rounded-xl border border-slate-200 relative overflow-hidden">
                                                        <div className="absolute top-0 right-0 p-4 opacity-10 font-black text-6xl select-none">{idx+1}</div>
                                                        <h4 className="font-bold text-lg text-slate-800 mb-3">玩家 {idx+1}</h4>
                                                        <div className="space-y-2">
                                                            {Object.keys(counts).map(type => counts[type] > 0 && (
                                                                <div key={type} className={`flex justify-between items-center text-sm px-2 py-1 rounded ${CARD_INFO[type].color} bg-opacity-20`}>
                                                                    <span>{CARD_INFO[type].name}</span><span className="font-bold">x {counts[type]}</span>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ================= 學生闖關：食物網教學 ================= */}
                        {viewMode === 'intro' && (
                            <div className="space-y-6 animate-fade-in">
                                <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-indigo-100">
                                    <div className="text-center max-w-2xl mx-auto mb-6">
                                        <h2 className="text-2xl font-bold text-indigo-800 mb-2">🐾 學生必修：食物網建構任務</h2>
                                        <p className="text-slate-500">完成此任務才能解鎖對戰系統喔！</p>
                                    </div>

                                    <div className="bg-indigo-50 border-l-4 border-indigo-500 p-5 rounded-r-xl mb-6 shadow-sm">
                                        {introPhase === 1 && (
                                            <div className="text-indigo-900 space-y-2">
                                                <h3 className="font-bold text-lg flex items-center gap-2"><Network className="w-5 h-5"/> 階段一：建構食物網</h3>

                                                <p>2. 切換至 <strong className="bg-white px-2 py-0.5 rounded text-red-600">↗️ 畫被吃連線</strong>，依照字卡提示的<strong className="text-red-500">「生存條件」</strong>，從獵物畫線連到捕食者！</p>
                                            </div>
                                        )}
                                        {introPhase >= 2 && (

                                                <p>請利用卡片下方的小按鈕，為每隻生物點亮正確的<strong className="bg-indigo-200 px-2 py-0.5 rounded text-indigo-800">生態階層</strong>。<br/><span className="text-sm opacity-90 text-red-600 font-bold">💡 提示：吃不只一種東西的生物可「複選」！可拖拉卡片以防擋住連線。</span></p>
                                            </div>
                                        )}
                                    </div>

                                    {introPhase === 1 && (
                                        <div className="flex justify-center gap-4 mb-4">
                                            <button onClick={() => { setInteractionMode('move'); setDrawingSource(null); }} className={`px-5 py-2.5 rounded-full font-bold flex items-center gap-2 transition-all ${interactionMode === 'move' ? 'bg-indigo-600 text-white shadow-md scale-105' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}><Hand className="w-5 h-5" /> 🖐️ 自由移動</button>
                                            <button onClick={() => setInteractionMode('draw')} className={`px-5 py-2.5 rounded-full font-bold flex items-center gap-2 transition-all ${interactionMode === 'draw' ? 'bg-red-500 text-white shadow-md scale-105' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}><ArrowUpRight className="w-5 h-5" /> ↗️ 畫被吃連線</button>
                                        </div>
                                    )}

                                            <defs>
                                                <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><polygon points="0 0, 8 4, 0 8" fill="#6366f1" /></marker>

                                            <div 
                                                key={type} 
                                                data-card-type={type}

                                                {introPhase >= 2 && (
                                                    <div className="mt-2 flex flex-wrap gap-1 justify-center" onPointerDown={(e) => e.stopPropagation()}>
                                                        {ECOLOGICAL_ROLES.map(role => (
                                                            <button key={role.id} onClick={(e) => toggleLabel(type, role.id, e)} className={`text-[10px] w-[45%] py-1 rounded transition-all ${labels[type].includes(role.id) ? 'bg-indigo-500 text-white font-bold shadow-inner border border-indigo-600' : 'bg-white text-slate-500 border border-slate-300 hover:bg-indigo-50'}`}>{role.label}</button>

                                                    </div>

                                            </div>

                                                {introFeedback.type === 'success' ? <Leaf className="w-5 h-5 shrink-0 mt-0.5" /> : <AlertCircle className="w-5 h-5 shrink-0 mt-0.5" />}
                                                <span>{introFeedback.msg}</span>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ================= 學生大廳 (闖關後進入) ================= */}
                        {viewMode === 'student_home' && (
                            <div className="py-12 animate-fade-in text-center max-w-3xl mx-auto">
                                <div className="mb-10">
                                    <h2 className="text-3xl text-slate-700 font-bold">請選擇對戰模式</h2>
                                    <p className="text-slate-500 mt-2">請依照老師上課的指示選擇對應的模式喔！</p>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <button onClick={() => {setViewMode('student_individual'); setShowResult(false); setEcosystemHand(countCards([]));}} className="bg-white p-10 rounded-3xl shadow-sm border-2 border-cyan-100 hover:border-cyan-500 hover:shadow-md transition-all flex flex-col items-center gap-4 group">
                                        <div className="w-20 h-20 bg-cyan-100 rounded-full flex items-center justify-center group-hover:scale-110 transition-transform"><Activity className="w-10 h-10 text-cyan-600" /></div>
                                        <h3 className="font-bold text-2xl text-slate-800">個人戰計算機</h3>
                                        <p className="text-slate-500 font-medium">輸入手上的5張卡牌<br/>計算最終得分</p>
                                    </button>
                                    <button onClick={() => {setViewMode('student_team_personal'); setEncounterTarget(null); setPersonalResult(null);}} className="bg-white p-10 rounded-3xl shadow-sm border-2 border-orange-100 hover:border-orange-500 hover:shadow-md transition-all flex flex-col items-center gap-4 group relative border-orange-400 shadow-orange-100">
                                        <div className="w-20 h-20 bg-orange-100 rounded-full flex items-center justify-center group-hover:scale-110 transition-transform"><Crosshair className="w-10 h-10 text-orange-600" /></div>
                                        <h3 className="font-bold text-2xl text-slate-800">走動對戰雷達 (團隊戰)</h3>
                                        <p className="text-slate-500 font-medium">跨區覓食、繁衍分身<br/>結算最終小組貢獻</p>
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* ================= 學生：個人戰計算機 ================= */}
                        {viewMode === 'student_individual' && (
                            <div className="space-y-6 animate-fade-in">
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-cyan-200">
                                    <h2 className="text-2xl font-bold text-cyan-800 flex items-center gap-2 mb-6"><Activity className="w-6 h-6" /> 個人戰計算機 (5張手牌)</h2>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                        {BASE_RATIO_CONFIG.map((card) => (
                                            <div key={card.type} className={`p-4 rounded-xl border-2 flex flex-col justify-between ${card.color} bg-opacity-10`}>
                                                <div className="flex justify-between items-start mb-2">
                                                    <span className="font-bold text-lg block">{card.name}</span>
                                                    <span className="bg-white px-2 py-1 rounded text-xs font-bold shadow-sm">{card.score} 分/張</span>
                                                </div>
                                                <div className="flex items-center justify-between bg-white/80 rounded-lg p-2 mt-2">
                                                    <button onClick={() => adjustHand(card.type, -1)} className="p-1.5 hover:bg-slate-100 rounded-md text-slate-600"><Minus className="w-4 h-4" /></button>
                                                    <span className="font-black text-2xl w-12 text-center text-slate-700">{ecosystemHand[card.type]}</span>
                                                    <button onClick={() => adjustHand(card.type, 1)} className="p-1.5 hover:bg-slate-100 rounded-md text-slate-600"><Plus className="w-4 h-4" /></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="mt-8 flex justify-center">
                                        <button onClick={()=>calculateScoreOld()} className="px-10 py-4 bg-cyan-700 hover:bg-cyan-800 text-white text-xl font-bold rounded-xl shadow-lg transition-all active:scale-95 flex items-center gap-3"><Calculator className="w-6 h-6" /> 計算最終得分</button>
                                    </div>
                                </div>

                                {/* 結算報告區塊 */}
                                {showResult && simulationResult && (
                                    <div id="results-section" className="bg-white rounded-2xl shadow-xl border-2 border-cyan-500 overflow-hidden animate-slide-up">
                                        <div className="bg-cyan-600 text-white p-6 flex justify-between items-center">
                                            <h2 className="text-2xl font-bold flex items-center gap-2"><Trophy className="w-8 h-8 text-yellow-300" /> 系統結算報告</h2>
                                            <div className="text-right"><div className="text-sm opacity-80 text-cyan-100">總得分</div><div className="text-4xl font-black text-yellow-300">{simulationResult.score}</div></div>
                                        </div>
                                        <div className="grid grid-cols-1 lg:grid-cols-2">
                                            <div className="p-6 bg-slate-50 border-r border-slate-200 max-h-[500px] overflow-y-auto">
                                                <h3 className="font-bold text-slate-700 mb-4 flex items-center gap-2"><Activity className="w-5 h-5" /> 電腦模擬推演過程</h3>
                                                <div className="space-y-3 text-sm font-mono">
                                                    {simulationResult.logs.map((log, idx) => (
                                                        <div key={idx} className={`p-2 rounded border-l-4 ${log.type === 'success' ? 'bg-green-50 border-green-500 text-green-800' : log.type === 'fail' ? 'bg-red-50 border-red-500 text-red-800' : 'bg-white border-slate-300'}`}>{log.msg}</div>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className="p-6">
                                                <h3 className="font-bold text-slate-700 mb-4 flex items-center gap-2"><ShieldAlert className="w-5 h-5" /> 系統得分清單比對</h3>
                                                <div className="space-y-4">
                                                    {Object.keys(simulationResult.details).map(type => {
                                                        const data = simulationResult.details[type];
                                                        if (data.scoring === 0 && data.starved === 0 && ecosystemHand[type] === 0) return null;
                                                        return (
                                                            <div key={type} className="flex items-center justify-between border-b pb-2">
                                                                <div className="flex items-center gap-3">
                                                                    <span className="font-bold">{CARD_INFO[type].name}</span>
                                                                    <div className="text-xs flex flex-wrap gap-1">
                                                                        {data.starved > 0 && <span className="bg-slate-100 text-slate-500 px-1 rounded">餓死 {data.starved}</span>}
                                                                        {data.eaten > 0 && <span className="bg-red-50 text-red-400 px-1 rounded">被吃 {data.eaten}</span>}
                                                                    </div>
                                                                </div>
                                                                <div className="flex flex-col items-end">
                                                                    <span className="font-bold text-cyan-600">{data.scoring} 隻存活得分</span>
                                                                    {data.scoring > 0 && <span className="text-xs text-slate-400">+{data.scoring * CARD_INFO[type].score}分</span>}
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ================= 學生：團隊戰 - 對戰雷達 ================= */}
                        {viewMode === 'student_team_personal' && (
                            <div className="animate-fade-in relative min-h-[500px] flex flex-col gap-6">
                                
                                {/* 死亡灰屏覆蓋 */}
                                {isDead && (
                                    <div className="absolute inset-0 bg-slate-800/90 z-[80] rounded-2xl flex flex-col items-center justify-center p-6 text-center backdrop-blur-sm shadow-2xl">
                                        <Ghost className="w-24 h-24 text-slate-400 mb-6 animate-pulse" />
                                        <h2 className="text-4xl font-black text-white mb-2 tracking-widest">族群已覆滅</h2>
                                        <p className="text-slate-300 text-lg mb-10">你的本體與分身已全數陣亡，戰利品清空。<br/>請移動至「講台死亡區」等待隊友救援。</p>
                                        <button onClick={() => { setIsDead(false); setMyRole(null); setMyCount(1); setEncounterTarget(null); setMyInventory(countCards([])); }} className="px-10 py-4 bg-emerald-500 hover:bg-emerald-600 text-white text-xl font-bold rounded-full shadow-[0_0_20px_rgba(16,185,129,0.5)] transition-all active:scale-95 flex items-center gap-2 border-2 border-emerald-400">
                                            ✨ 我被隊友復活了
                                        </button>
                                    </div>
                                )}

                                {/* 食物網小抄 (可收合) */}
                                <div className="bg-indigo-50 rounded-2xl border border-indigo-200 overflow-hidden shadow-sm">
                                    <button onClick={() => setShowMiniWeb(!showMiniWeb)} className="w-full p-4 font-bold text-indigo-800 flex justify-between items-center hover:bg-indigo-100 transition-colors">
                                        <span className="flex items-center gap-2"><Network className="w-5 h-5"/> 🗺️ 檢視我的食物網 (小抄)</span>
                                        <span>{showMiniWeb ? '▲ 收起' : '▼ 展開'}</span>
                                    </button>
                                    
                                    {showMiniWeb && (
                                        <div className="p-4 border-t border-indigo-200 bg-white">
                                            <div className="relative w-full h-[400px] bg-slate-50 border border-slate-200 rounded-lg overflow-hidden flex items-center justify-center">
                                                <div className="absolute" style={{width: '800px', height: '600px', transform: 'scale(0.65)', transformOrigin: 'center'}}>
                                                    <svg className="absolute inset-0 w-full h-full pointer-events-none" style={{ zIndex: 10 }}>
                                                        <defs><marker id="arrowhead" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><polygon points="0 0, 8 4, 0 8" fill="#6366f1" /></marker></defs>
                                                        {renderIntroEdges(true)}
                                                    </svg>
                                                    {Object.keys(CARD_INFO).map(type => (
                                                        <div 
                                                            key={type} 
                                                            data-card-type={type} 
                                                            style={{ left: `calc(${positions[type].x}% - 70px)`, top: `calc(${positions[type].y}% - 65px)`, width: '140px' }} 
                                                            className={`absolute z-20 p-2 border-2 rounded-xl text-center shadow-sm select-none bg-white ${CARD_INFO[type].color}`}>
                                                            <div className="font-bold text-lg leading-tight">{CARD_INFO[type].name}</div>
                                                            <div className="text-[11px] leading-tight opacity-90 mt-1 mb-1 bg-white/70 px-1.5 py-0.5 rounded inline-block text-slate-800 font-bold border border-slate-200">{CARD_INFO[type].desc}</div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-orange-200">
                                    <div className="flex justify-between items-center mb-6 pb-4 border-b-2 border-slate-100">
                                        <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><Crosshair className="w-6 h-6 text-orange-600" /> 對戰雷達</h2>
                                        <div className="px-4 py-1.5 bg-green-100 text-green-700 font-bold rounded-full text-sm shadow-sm flex items-center gap-2">🟢 存活中</div>
                                    </div>

                                    {!myRole && (
                                        <div className="space-y-6">
                                            <div className="text-center">
                                                <h3 className="text-xl font-bold text-slate-700">請設定你的專屬生物角色</h3>
                                                <p className="text-slate-500 text-sm mt-1">選定後無法更改，請確實選擇老師發給你的卡牌<br/>(若被復活，請選擇與救援者相同的生物)</p>
                                            </div>
                                            <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                                                {BASE_RATIO_CONFIG.map(card => (
                                                    <button key={card.type} onClick={() => {setMyRole(card.type); setMyCount(1);}} className={`p-4 rounded-xl border-2 flex flex-col items-center justify-center transition-all hover:scale-105 shadow-sm hover:shadow-md ${card.color}`}>
                                                        <span className="font-bold text-lg">{card.name}</span>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {myRole && !isDead && (
                                        <div className="space-y-8">
                                            <div className="flex flex-col md:flex-row gap-4">
                                                <div className={`p-4 rounded-xl border-2 flex flex-col items-center justify-center w-full md:w-1/3 shadow-sm relative ${CARD_INFO[myRole].color}`}>
                                                    <span className="absolute top-2 right-2 bg-slate-800 text-white text-xs font-black px-2 py-1 rounded-lg">x {myCount} 隻</span>
                                                    <span className="text-xs text-slate-500 mb-1">我的角色與分身</span>
                                                    <span className="font-black text-2xl">{CARD_INFO[myRole].name}</span>
                                                    <span className="text-[10px] mt-1 px-1.5 py-0.5 bg-white/50 rounded">{CARD_INFO[myRole].desc} (每隻)</span>
                                                </div>
                                                <div className="flex-1 bg-slate-50 p-4 rounded-xl border border-slate-200">
                                                    <span className="text-xs text-slate-500 mb-2 block font-bold">🎒 我的戰利品背包 (吃的東西)</span>
                                                    <div className="flex flex-wrap gap-2">
                                                        {Object.keys(myInventory).filter(t => myInventory[t] > 0).map(t => (
                                                            <div key={t} className={`px-3 py-1.5 rounded-lg text-sm font-bold shadow-sm flex items-center gap-2 ${CARD_INFO[t].color}`}>
                                                                {CARD_INFO[t].name} <span className="bg-white/80 px-1.5 py-0.5 rounded text-xs">x{myInventory[t]}</span>
                                                            </div>
