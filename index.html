<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海洋生態食物鏈</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @keyframes shimmer { 100% { transform: translateX(100%); } }
        .animate-shimmer { animation: shimmer 2s infinite; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        .animate-slide-up { animation: slideUp 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-cyan-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // --- 內建圖示元件 ---
        const IconBase = ({ children, className, ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>{children}</svg>
        );

        const Fish = (props) => <IconBase {...props}><path d="M6.5 12c.94-3.46 4.96-6 8.5-6 3.54 0 6.46 2.31 7.5 5.5-1.04 3.19-3.96 5.5-7.5 5.5-3.54 0-7.56-2.54-8.5-6Z"/><path d="M18 12v.5"/></IconBase>;
        const Utensils = (props) => <IconBase {...props}><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></IconBase>;
        const Activity = (props) => <IconBase {...props}><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></IconBase>;
        const Plus = (props) => <IconBase {...props}><path d="M5 12h14"/><path d="M12 5v14"/></IconBase>;
        const Minus = (props) => <IconBase {...props}><path d="M5 12h14"/></IconBase>;
        const RefreshCw = (props) => <IconBase {...props}><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 21h-5v-5"/></IconBase>;
        const Trophy = (props) => <IconBase {...props}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></IconBase>;
        const Users = (props) => <IconBase {...props}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></IconBase>;
        const Calculator = (props) => <IconBase {...props}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></IconBase>;
        const ScrollText = (props) => <IconBase {...props}><path d="M8 21h12a2 2 0 0 0 2-2v-2a10 10 0 0 0-10-10c-5.52 0-10 4.48-10 10v2a2 2 0 0 0 2 2h2c1.66 0 3-1.34 3-3V9c0-1.1.9-2 2-2h4"/><path d="M19 17V5a2 2 0 0 0-2-2H4"/></IconBase>;
        const AlertCircle = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></IconBase>;
        const Copy = (props) => <IconBase {...props}><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></IconBase>;
        const Swords = (props) => <IconBase {...props}><polyline points="14.5 17.5 3 6 3 3 6 3 17.5 14.5"/><line x1="13" x2="19" y1="19" y2="13"/><line x1="16" x2="20" y1="16" y2="20"/><line x1="19" x2="21" y1="21" y2="19"/><polyline points="14.5 6.5 18 3 21 3 21 6 17.5 9.5"/><line x1="5" x2="9" y1="14" y2="10"/><line x1="17" x2="11" y1="11" y2="17"/><line x1="9" x2="7" y1="21" y2="19"/><line x1="11" x2="13" y1="15" y2="13"/></IconBase>;
        const Leaf = (props) => <IconBase {...props}><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.5 1 10-2.45 4-7.5 5.5-9 8Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></IconBase>;
        const ShieldAlert = (props) => <IconBase {...props}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></IconBase>;
        const GraduationCap = (props) => <IconBase {...props}><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></IconBase>;
        const School = (props) => <IconBase {...props}><path d="m4 6 8-4 8 4"/><path d="m18 10 4 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-8l4-2"/><path d="M14 22v-4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v4"/><path d="M18 5v17"/><path d="M6 5v17"/><circle cx="12" cy="9" r="2"/></IconBase>;
        const Network = (props) => <IconBase {...props}><rect x="16" y="16" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/><path d="M5 16v-3a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v3"/><path d="M12 8v4"/></IconBase>;
        const Hand = (props) => <IconBase {...props}><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v2"/><path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v8"/><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/></IconBase>;
        const ArrowUpRight = (props) => <IconBase {...props}><path d="M7 7h10v10"/><path d="M7 17 17 7"/></IconBase>;

        // --- 設定檔與常數 ---
        const CardType = { ALGAE: 'algae', COPEPOD: 'copepod', KRILL: 'krill', HERRING: 'herring', SQUID: 'squid', SHARK: 'shark' };

        const BASE_RATIO_CONFIG = [
            { type: CardType.ALGAE, ratio: 10/36, name: '浮游藻類', score: 1, color: 'bg-green-50 border-green-500 text-green-800' },
            { type: CardType.COPEPOD, ratio: 7/36, name: '劍水蚤', score: 2, color: 'bg-yellow-50 border-yellow-500 text-yellow-800' },
            { type: CardType.KRILL, ratio: 7/36, name: '磷蝦', score: 2, color: 'bg-orange-50 border-orange-500 text-orange-800' },
            { type: CardType.HERRING, ratio: 6/36, name: '鯡魚', score: 3, color: 'bg-blue-50 border-blue-500 text-blue-800' },
            { type: CardType.SQUID, ratio: 4/36, name: '烏賊', score: 3, color: 'bg-purple-50 border-purple-500 text-purple-800' },
            { type: CardType.SHARK, ratio: 2/36, name: '鯊魚', score: 4, color: 'bg-red-50 border-red-500 text-red-800' },
        ];

        const CARD_INFO = BASE_RATIO_CONFIG.reduce((acc, card) => { acc[card.type] = card; return acc; }, {});

        // --- 輔助函式 ---
        const generateDeckByPlayers = (numPlayers) => {
            const totalCards = numPlayers * 5; 
            let deck = [];
            BASE_RATIO_CONFIG.forEach(({ type, ratio }) => {
                const count = Math.round(totalCards * ratio);
                for (let i = 0; i < count; i++) deck.push(type);
            });
            while (deck.length < totalCards) deck.push(CardType.ALGAE);
            while (deck.length > totalCards) deck.pop();
            return deck;
        };
        const shuffleDeck = (deck) => {
            const newDeck = [...deck];
            for (let i = newDeck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newDeck[i], newDeck[j]] = [newDeck[j], newDeck[i]];
            }
            return newDeck;
        };
        const countCards = (cardList) => {
            const counts = { [CardType.ALGAE]: 0, [CardType.COPEPOD]: 0, [CardType.KRILL]: 0, [CardType.HERRING]: 0, [CardType.SQUID]: 0, [CardType.SHARK]: 0 };
            cardList.forEach(type => { if (counts[type] !== undefined) counts[type]++; });
            return counts;
        };
        const getPlayerLabel = (index) => String.fromCharCode(65 + index);

        // --- 主程式元件 ---
        function OceanCardGame() {
            const [viewMode, setViewMode] = useState('home');
            
            // --- Intro (教學) 狀態 ---
            // introPhase: 1 (畫線建立食物網), 2 (標示生態階層), 3 (完成)
            const [introPhase, setIntroPhase] = useState(1);
            
            // 初始隨機散佈位置 (百分比)
            const initialPositions = {
                [CardType.ALGAE]: { x: 15, y: 80 },
                [CardType.COPEPOD]: { x: 35, y: 80 },
                [CardType.KRILL]: { x: 55, y: 80 },
                [CardType.HERRING]: { x: 25, y: 55 },
                [CardType.SQUID]: { x: 45, y: 55 },
                [CardType.SHARK]: { x: 75, y: 80 },
            };
            
            const [positions, setPositions] = useState(initialPositions);
            const [edges, setEdges] = useState([]);
            const [labels, setLabels] = useState({ [CardType.ALGAE]: '', [CardType.COPEPOD]: '', [CardType.KRILL]: '', [CardType.HERRING]: '', [CardType.SQUID]: '', [CardType.SHARK]: '' });
            
            const [interactionMode, setInteractionMode] = useState('move'); // 'move' 或 'draw'
            const [dragNode, setDragNode] = useState(null);
            const [drawingSource, setDrawingSource] = useState(null);
            const [mouseCoords, setMouseCoords] = useState({ x: 0, y: 0 }); 
            const [introFeedback, setIntroFeedback] = useState(null);
            
            const containerRef = useRef(null);

            // 老師與學生狀態
            const [numPlayers, setNumPlayers] = useState(4); 
            const [distributedHands, setDistributedHands] = useState([]); 
            const [isDistributed, setIsDistributed] = useState(false);
            const [currentDeckSize, setCurrentDeckSize] = useState(36);
            const [copyFeedback, setCopyFeedback] = useState("");
            const [ecosystemHand, setEcosystemHand] = useState(countCards([])); 
            const [simulationResult, setSimulationResult] = useState(null);
            const [showResult, setShowResult] = useState(false);

            // ================= 教學模式：畫布與滑鼠互動邏輯 =================
            const enterIntroMode = () => {
                setIntroPhase(1);
                setPositions(initialPositions);
                setEdges([]);
                setLabels({ [CardType.ALGAE]: '', [CardType.COPEPOD]: '', [CardType.KRILL]: '', [CardType.HERRING]: '', [CardType.SQUID]: '', [CardType.SHARK]: '' });
                setInteractionMode('move');
                setDrawingSource(null);
                setIntroFeedback(null);
                setViewMode('intro');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handlePointerDown = (e, type) => {
                if (e.button !== 0) return; // 確保是左鍵點擊
                
                if (interactionMode === 'move') {
                    setDragNode(type);
                    e.target.setPointerCapture(e.pointerId);
                    e.stopPropagation();
                } else if (interactionMode === 'draw' && introPhase === 1) {
                    if (!drawingSource) {
                        setDrawingSource(type);
                    } else {
                        if (drawingSource !== type) {
                            const exists = edges.some(ed => ed.from === drawingSource && ed.to === type);
                            if (!exists) setEdges([...edges, { from: drawingSource, to: type }]);
                        }
                        setDrawingSource(null);
                    }
                    e.stopPropagation();
                }
            };

            const handlePointerMove = (e) => {
                if (!containerRef.current) return;
                const rect = containerRef.current.getBoundingClientRect();

                if (dragNode) {
                    // 轉為百分比儲存，讓視窗縮放時依然保持相對位置
                    const pxX = Math.max(0, Math.min(rect.width, e.clientX - rect.left));
                    const pxY = Math.max(0, Math.min(rect.height, e.clientY - rect.top));
                    setPositions(prev => ({
                        ...prev,
                        [dragNode]: { x: (pxX / rect.width) * 100, y: (pxY / rect.height) * 100 }
                    }));
                } else if (drawingSource) {
                    setMouseCoords({
                        x: ((e.clientX - rect.left) / rect.width) * 100,
                        y: ((e.clientY - rect.top) / rect.height) * 100
                    });
                }
            };

            const handlePointerUp = (e) => {
                if (dragNode) {
                    setDragNode(null);
                    if(e.target.releasePointerCapture) e.target.releasePointerCapture(e.pointerId);
                }
            };

            const removeEdge = (index) => {
                setEdges(prev => prev.filter((_, i) => i !== index));
            };

            // ================= 驗證邏輯 =================
            const verifyPhase1 = () => {
                const expectedEdges = [
                    { from: CardType.ALGAE, to: CardType.COPEPOD },
                    { from: CardType.ALGAE, to: CardType.KRILL },
                    { from: CardType.ALGAE, to: CardType.HERRING },
                    { from: CardType.COPEPOD, to: CardType.HERRING },
                    { from: CardType.COPEPOD, to: CardType.SQUID },
                    { from: CardType.KRILL, to: CardType.SQUID },
                    { from: CardType.HERRING, to: CardType.SHARK },
                    { from: CardType.SQUID, to: CardType.SHARK },
                ];

                if (edges.length !== expectedEdges.length) {
                    setIntroFeedback({ type: 'error', msg: `🤔 箭頭數量不對！應該要有 ${expectedEdges.length} 條連線，目前有 ${edges.length} 條。` });
                    return;
                }

                const isEdgesCorrect = expectedEdges.every(expected => 
                    edges.some(e => e.from === expected.from && e.to === expected.to)
                );

                if (!isEdgesCorrect) {
                    setIntroFeedback({ type: 'error', msg: '🤔 連線有錯！請重新確認誰吃誰（箭頭方向代表能量流動：被吃 👉 捕食者）。' });
                    return;
                }

                setIntroPhase(2);
                setInteractionMode('move'); // 鎖定回移動模式
                setIntroFeedback({ type: 'success', msg: '🎉 食物網建構正確！現在請透過卡片下方的選單，標註每隻生物的「生態階層」。' });
            };

            const verifyPhase2 = () => {
                const expectedLabels = {
                    [CardType.ALGAE]: 'producer',
                    [CardType.COPEPOD]: 'primary',
                    [CardType.KRILL]: 'primary',
                    [CardType.HERRING]: 'secondary',
                    [CardType.SQUID]: 'secondary',
                    [CardType.SHARK]: 'tertiary'
                };

                const hasEmpty = Object.values(labels).some(l => l === '');
                if (hasEmpty) {
                    setIntroFeedback({ type: 'error', msg: '請為所有的生物都選擇一個生態階層喔！' });
                    return;
                }

                const isLabelsCorrect = Object.keys(expectedLabels).every(type => labels[type] === expectedLabels[type]);

                if (!isLabelsCorrect) {
                    setIntroFeedback({ type: 'error', msg: '🤔 生態階層標註有誤！請觀察剛剛拉好的食物網階層來重新判斷。' });
                    return;
                }

                setIntroPhase(3);
                setIntroFeedback({ type: 'success', msg: '🎉 太棒了！你完美掌握了食物網與生態階層的關聯，準備好進入遊戲了嗎？' });
            };

            // ================= 老師與學生模式邏輯 (沿用) =================
            const handleDistribute = () => {
                const fullDeck = generateDeckByPlayers(numPlayers);
                setCurrentDeckSize(fullDeck.length);
                const deck = shuffleDeck(fullDeck);
                const hands = Array.from({ length: numPlayers }, () => []);
                deck.forEach((card, index) => hands[index % numPlayers].push(card));
                setDistributedHands(hands.map(hand => hand.sort()));
                setIsDistributed(true);
            };

            const handleCopyDistribution = async () => {
                let text = `🌊 海洋生態發牌結果 (總人數: ${numPlayers}, 總牌數: ${currentDeckSize})\n\n`;
                distributedHands.forEach((hand, idx) => {
                    const counts = countCards(hand);
                    let handStr = [];
                    Object.keys(counts).forEach(type => { if (counts[type] > 0) handStr.push(`${CARD_INFO[type].name}x${counts[type]}`); });
                    text += `👤 玩家 ${getPlayerLabel(idx)}: ${handStr.join(', ') || '無'}\n`;
                });
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText(text); setCopyFeedback("已複製！");
                } else { setCopyFeedback("複製失敗"); }
                setTimeout(() => setCopyFeedback(""), 2000);
            };

            const enterStudentMode = () => {
                setEcosystemHand(countCards([])); setSimulationResult(null); setShowResult(false);
                setViewMode('student'); window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const adjustHand = (type, delta) => { setEcosystemHand(prev => ({ ...prev, [type]: Math.max(0, prev[type] + delta) })); setShowResult(false); };
            
            const calculateScore = () => {
                let foodPool = { ...ecosystemHand }; 
                let score = 0; let logs = []; 
                let details = {
                    [CardType.SHARK]: { scoring: 0, starved: 0 }, [CardType.HERRING]: { scoring: 0, starved: 0, eaten: 0 },
                    [CardType.SQUID]: { scoring: 0, starved: 0, eaten: 0 }, [CardType.COPEPOD]: { scoring: 0, starved: 0, eaten: 0 },
                    [CardType.KRILL]: { scoring: 0, starved: 0, eaten: 0 }, [CardType.ALGAE]: { scoring: 0, starved: 0, eaten: 0 },
                };
                const addLog = (msg, type = 'info') => logs.push({ msg, type });
                addLog("--- 開始生態結算 (食物網大亂鬥) ---", 'header');
                
                for (let i = 0; i < ecosystemHand[CardType.SHARK]; i++) {
                    if (foodPool[CardType.HERRING] >= 2 && foodPool[CardType.SQUID] >= 2) {
                        details[CardType.SHARK].scoring++; foodPool[CardType.HERRING] -= 2; foodPool[CardType.SQUID] -= 2;
                        details[CardType.HERRING].eaten += 2; details[CardType.SQUID].eaten += 2; addLog(`✅ 鯊魚 #${i+1} 捕食成功`, 'success');
                    } else { details[CardType.SHARK].starved++; addLog(`💀 鯊魚 #${i+1} 食物不足`, 'fail'); }
                }
                for (let i = 0; i < ecosystemHand[CardType.HERRING]; i++) {
                    if (foodPool[CardType.ALGAE] >= 3 && foodPool[CardType.COPEPOD] >= 1) {
                        details[CardType.HERRING].scoring++; foodPool[CardType.ALGAE] -= 3; foodPool[CardType.COPEPOD] -= 1;
                        details[CardType.ALGAE].eaten += 3; details[CardType.COPEPOD].eaten += 1;
                    } else { details[CardType.HERRING].starved++; }
                }
                for (let i = 0; i < ecosystemHand[CardType.SQUID]; i++) {
                    if (foodPool[CardType.KRILL] >= 2 && foodPool[CardType.COPEPOD] >= 1) {
                        details[CardType.SQUID].scoring++; foodPool[CardType.KRILL] -= 2; foodPool[CardType.COPEPOD] -= 1;
                        details[CardType.KRILL].eaten += 2; details[CardType.COPEPOD].eaten += 1;
                    } else { details[CardType.SQUID].starved++; }
                }
                for (let i = 0; i < ecosystemHand[CardType.COPEPOD]; i++) {
                    if (foodPool[CardType.ALGAE] >= 2) { details[CardType.COPEPOD].scoring++; foodPool[CardType.ALGAE] -= 2; details[CardType.ALGAE].eaten += 2;
                    } else { details[CardType.COPEPOD].starved++; }
                }
                for (let i = 0; i < ecosystemHand[CardType.KRILL]; i++) {
                    if (foodPool[CardType.ALGAE] >= 2) { details[CardType.KRILL].scoring++; foodPool[CardType.ALGAE] -= 2; details[CardType.ALGAE].eaten += 2;
                    } else { details[CardType.KRILL].starved++; }
                }
                details[CardType.ALGAE].scoring = ecosystemHand[CardType.ALGAE];
                Object.keys(details).forEach(type => { score += details[type].scoring * CARD_INFO[type].score; });
                setSimulationResult({ score, details, logs }); setShowResult(true);
                setTimeout(() => { document.getElementById('results-section')?.scrollIntoView({ behavior: 'smooth' }); }, 100);
            };

            return (
                <div className="min-h-screen bg-cyan-50 p-4 md:p-8 font-sans text-slate-800">
                    <div className="max-w-5xl mx-auto space-y-6">
                        
                        {/* Header */}
                        <header className="flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-cyan-100">
                            <div>
                                <h1 className="text-3xl font-bold text-cyan-800 flex items-center gap-2 cursor-pointer hover:opacity-80 transition-opacity" onClick={() => setViewMode('home')}>
                                    <Fish className="w-8 h-8" /> 海洋生態食物鏈
                                </h1>
                            </div>
                            {viewMode !== 'home' && (
                                <button onClick={() => setViewMode('home')} className="mt-4 md:mt-0 px-4 py-2 text-sm text-slate-500 hover:bg-slate-100 rounded-lg transition-colors flex items-center gap-2">
                                    <School className="w-4 h-4" /> 回首頁
                                </button>
                            )}
                        </header>

                        {/* ================= 首頁 ================= */}
                        {viewMode === 'home' && (
                            <div className="py-12 animate-fade-in text-center">
                                <h2 className="text-2xl text-slate-600 font-bold mb-10">請選擇您的任務</h2>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-5xl mx-auto px-4">
                                    <button onClick={() => setViewMode('teacher')} className="group relative bg-white p-8 rounded-3xl shadow-md border-2 border-cyan-100 hover:border-cyan-500 hover:shadow-xl transition-all duration-300 flex flex-col items-center gap-4">
                                        <div className="w-16 h-16 bg-cyan-100 rounded-full flex items-center justify-center group-hover:scale-110 transition-transform"><GraduationCap className="w-8 h-8 text-cyan-700" /></div>
                                        <h3 className="text-xl font-bold text-slate-800">我是老師</h3>
                                        <div className="mt-auto pt-4 px-6 py-2 bg-cyan-50 text-cyan-700 rounded-full font-bold text-sm">進入發牌系統</div>
                                    </button>
                                    <button onClick={enterIntroMode} className="group relative bg-white p-8 rounded-3xl shadow-md border-2 border-indigo-100 hover:border-indigo-500 hover:shadow-xl transition-all duration-300 flex flex-col items-center gap-4 transform md:-translate-y-4">
                                        <div className="absolute -top-3 right-4 bg-indigo-500 text-white text-xs font-bold px-3 py-1 rounded-full animate-bounce">學生第一步</div>
                                        <div className="w-20 h-20 bg-indigo-100 rounded-full flex items-center justify-center group-hover:scale-110 transition-transform"><Network className="w-10 h-10 text-indigo-600" /></div>
                                        <h3 className="text-2xl font-bold text-slate-800">食物網教學</h3>
                                        <div className="mt-auto pt-4 w-full"><div className="px-6 py-3 bg-indigo-600 text-white rounded-full font-bold text-sm text-center shadow-lg group-hover:bg-indigo-700 transition-colors">開始探究配對</div></div>
                                    </button>
                                    <button onClick={enterStudentMode} className="group relative bg-white p-8 rounded-3xl shadow-md border-2 border-orange-100 hover:border-orange-500 hover:shadow-xl transition-all duration-300 flex flex-col items-center gap-4">
                                        <div className="w-16 h-16 bg-orange-100 rounded-full flex items-center justify-center group-hover:scale-110 transition-transform"><Swords className="w-8 h-8 text-orange-600" /></div>
                                        <h3 className="text-xl font-bold text-slate-800">戰鬥計算機</h3>
                                        <div className="mt-auto pt-4 px-6 py-2 bg-orange-50 text-orange-700 rounded-full font-bold text-sm">進入學生系統</div>
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* ================= 食物網教學 (兩階段探究) ================= */}
                        {viewMode === 'intro' && (
                            <div className="space-y-6 animate-fade-in" onClick={() => setDrawingSource(null)}>
                                <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-indigo-100">
                                    <div className="text-center max-w-2xl mx-auto mb-6">
                                        <h2 className="text-2xl font-bold text-indigo-800 mb-2">生態情境配對任務</h2>
                                    </div>

                                    {/* 階段指引 */}
                                    <div className="bg-indigo-50 border-l-4 border-indigo-500 p-5 rounded-r-xl mb-6 shadow-sm">
                                        {introPhase === 1 && (
                                            <div className="text-indigo-900 space-y-2">
                                                <h3 className="font-bold text-lg flex items-center gap-2"><Network className="w-5 h-5"/> 階段一：建構食物網</h3>
                                                <p>1. 點擊 <strong className="bg-white px-2 py-0.5 rounded text-indigo-700">🖐️ 自由移動</strong> 可以拖拉生物來佈置版面。</p>
                                                <p>2. 切換至 <strong className="bg-white px-2 py-0.5 rounded text-red-600">↗️ 畫被吃連線</strong>，點擊<strong className="text-red-500">「被吃」</strong>的生物再點擊<strong className="text-green-600">「捕食者」</strong>，拉出能量流動箭頭！</p>
                                            </div>
                                        )}
                                        {introPhase >= 2 && (
                                            <div className="text-indigo-900 space-y-2">
                                                <h3 className="font-bold text-lg flex items-center gap-2"><GraduationCap className="w-5 h-5"/> 階段二：標註生態階層</h3>
                                                <p>食物網建構完成！請觀察你剛剛拉出的網狀關係，利用卡片下方的下拉選單，為每隻生物選擇正確的<strong className="bg-indigo-200 px-2 py-0.5 rounded text-indigo-800">生態階層</strong>（如：生產者、消費者）。</p>
                                            </div>
                                        )}
                                    </div>

                                    {/* 畫布工具列 (僅階段一顯示畫線切換) */}
                                    {introPhase === 1 && (
                                        <div className="flex justify-center gap-4 mb-4">
                                            <button onClick={() => { setInteractionMode('move'); setDrawingSource(null); }} className={`px-5 py-2.5 rounded-full font-bold flex items-center gap-2 transition-all ${interactionMode === 'move' ? 'bg-indigo-600 text-white shadow-md scale-105' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}>
                                                <Hand className="w-5 h-5" /> 🖐️ 自由移動
                                            </button>
                                            <button onClick={() => setInteractionMode('draw')} className={`px-5 py-2.5 rounded-full font-bold flex items-center gap-2 transition-all ${interactionMode === 'draw' ? 'bg-red-500 text-white shadow-md scale-105' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}>
                                                <ArrowUpRight className="w-5 h-5" /> ↗️ 畫被吃連線
                                            </button>
                                        </div>
                                    )}

                                    {/* 互動大畫布 */}
                                    <div 
                                        ref={containerRef}
                                        className="relative w-full h-[500px] md:h-[600px] bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-slate-50 border-2 border-indigo-200 rounded-xl overflow-hidden touch-none shadow-inner mb-8"
                                        onPointerMove={handlePointerMove}
                                        onPointerUp={handlePointerUp}
                                        onPointerLeave={handlePointerUp}
                                    >
                                        {/* SVG 連線層 */}
                                        <svg className="absolute inset-0 w-full h-full pointer-events-none" style={{ zIndex: 10 }}>
                                            <defs>
                                                {/* refX 設為 55，確保箭頭提早結束，不會被 128px 寬的節點遮擋 */}
                                                <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="16" refY="3.5" orient="auto">
                                                    <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1" />
                                                </marker>
                                                <marker id="arrowhead-drawing" markerWidth="10" markerHeight="7" refX="16" refY="3.5" orient="auto">
                                                    <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
                                                </marker>
                                            </defs>
                                            
                                            {/* 已建立的連線 */}
                                            {edges.map((edge, idx) => (
                                                <line key={idx} x1={`${positions[edge.from].x}%`} y1={`${positions[edge.from].y}%`} x2={`${positions[edge.to].x}%`} y2={`${positions[edge.to].y}%`} stroke="#6366f1" strokeWidth="4" markerEnd="url(#arrowhead)" />
                                            ))}

                                            {/* 正在繪製的線 */}
                                            {drawingSource && positions[drawingSource] && (
                                                <line x1={`${positions[drawingSource].x}%`} y1={`${positions[drawingSource].y}%`} x2={`${mouseCoords.x}%`} y2={`${mouseCoords.y}%`} stroke="#94a3b8" strokeWidth="3" strokeDasharray="6,6" markerEnd="url(#arrowhead-drawing)" />
                                            )}
                                        </svg>

                                        {/* 刪除連線按鈕層 (僅階段一) */}
                                        {introPhase === 1 && (
                                            <div className="absolute inset-0 pointer-events-none" style={{ zIndex: 15 }}>
                                                {edges.map((edge, idx) => (
                                                    <button 
                                                        key={idx} 
                                                        onClick={(e) => { e.stopPropagation(); removeEdge(idx); }} 
                                                        className="absolute w-6 h-6 bg-white border-2 border-red-400 text-red-500 font-black rounded-full flex items-center justify-center transform -translate-x-1/2 -translate-y-1/2 pointer-events-auto hover:bg-red-500 hover:text-white hover:scale-110 transition-all shadow-md" 
                                                        style={{ left: `${(positions[edge.from].x + positions[edge.to].x)/2}%`, top: `${(positions[edge.from].y + positions[edge.to].y)/2}%`, fontSize: '12px' }}
                                                    >
                                                        ✕
                                                    </button>
                                                ))}
                                            </div>
                                        )}

                                        {/* 生物節點層 */}
                                        {Object.keys(CARD_INFO).map(type => (
                                            <div 
                                                key={type}
                                                style={{ left: `calc(${positions[type].x}% - 64px)`, top: `calc(${positions[type].y}% - ${introPhase >= 2 ? '45px' : '30px'})`, width: '128px' }}
                                                className={`absolute z-20 p-2 border-2 rounded-xl text-center shadow-sm select-none transition-transform bg-white ${CARD_INFO[type].color} ${drawingSource === type ? 'ring-4 ring-indigo-500 scale-105 shadow-xl' : ''} ${interactionMode === 'move' ? 'cursor-grab active:cursor-grabbing' : 'cursor-crosshair'}`}
                                                onPointerDown={(e) => handlePointerDown(e, type)}
                                            >
                                                <div className="font-bold text-lg">{CARD_INFO[type].name}</div>
                                                
                                                {/* 第二階段才出現下拉選單 */}
                                                {introPhase >= 2 && (
                                                    <div className="mt-2" onPointerDown={(e) => e.stopPropagation()}>
                                                        <select
                                                            value={labels[type]}
                                                            onChange={(e) => setLabels({...labels, [type]: e.target.value})}
                                                            className={`w-full text-xs p-1.5 rounded border focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white ${labels[type] ? 'border-indigo-400 text-indigo-700 font-bold' : 'border-slate-300 text-slate-500'}`}
                                                        >
                                                            <option value="" disabled>選擇階層...</option>
                                                            <option value="producer">🌿 生產者</option>
                                                            <option value="primary">🐛 初級消費者</option>
                                                            <option value="secondary">🐟 次級消費者</option>
                                                            <option value="tertiary">🦈 三級消費者</option>
                                                        </select>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>

                                    {/* 驗證區 */}
                                    <div className="flex flex-col items-center">
                                        {introPhase === 1 && (
                                            <button onClick={verifyPhase1} className="px-8 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-full shadow-lg transition-all active:scale-95">驗證食物網連線</button>
                                        )}
                                        {introPhase === 2 && (
                                            <button onClick={verifyPhase2} className="px-8 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-full shadow-lg transition-all active:scale-95">驗證生態階層</button>
                                        )}
                                        {introPhase === 3 && (
                                            <button onClick={enterStudentMode} className="px-8 py-4 bg-orange-500 hover:bg-orange-600 text-white font-black text-lg rounded-full shadow-lg transition-all active:scale-95 flex items-center gap-2 animate-bounce"><Swords className="w-6 h-6" /> 恭喜過關！開始進入遊戲對戰</button>
                                        )}

                                        {introFeedback && (
                                            <div className={`mt-4 p-4 rounded-lg border flex items-center gap-2 max-w-lg w-full ${introFeedback.type === 'success' ? 'bg-green-50 border-green-200 text-green-700' : 'bg-red-50 border-red-200 text-red-700'}`}>
                                                {introFeedback.type === 'success' ? <Leaf className="w-5 h-5 shrink-0" /> : <AlertCircle className="w-5 h-5 shrink-0" />}
                                                <span>{introFeedback.msg}</span>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ================= 老師模式 ================= */}
                        {viewMode === 'teacher' && (
                            <div className="space-y-6 animate-fade-in">
                                <div className="bg-white p-8 rounded-2xl shadow-sm border border-cyan-100">
                                    <div className="flex flex-col md:flex-row items-end gap-6 mb-8">
                                        <div className="flex-1 w-full">
                                            <label className="block text-lg font-bold text-slate-700 mb-2 flex items-center gap-2"><Users className="w-5 h-5" /> 請輸入「總遊戲人數」</label>
                                            <div className="flex items-center gap-4">
                                                <input type="number" min="1" max="100" value={numPlayers} onChange={(e) => setNumPlayers(Math.max(1, Math.min(100, parseInt(e.target.value) || 1)))} className="w-full text-3xl font-bold text-center px-4 py-4 rounded-xl border-2 border-slate-200 focus:border-cyan-500 outline-none transition-all" />
                                                <div className="text-sm text-slate-500 whitespace-nowrap">預計發出: <span className="font-bold text-cyan-600 text-lg">{numPlayers * 5}</span> 張牌</div>
                                            </div>
                                        </div>
                                        <button onClick={handleDistribute} className="w-full md:w-auto px-8 py-4 bg-cyan-600 hover:bg-cyan-700 text-white text-xl font-bold rounded-xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2"><RefreshCw className="w-6 h-6" /> 亂數發牌</button>
                                    </div>

                                    {isDistributed && (
                                        <div className="space-y-6">
                                            <h3 className="text-xl font-bold text-slate-700 border-b pb-2 flex justify-between items-center">
                                                <span>發牌結果</span>
                                                <button onClick={handleCopyDistribution} className="flex items-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-lg text-sm font-bold transition-colors">
                                                    {copyFeedback ? <span className="text-green-600">{copyFeedback}</span> : <><Copy className="w-4 h-4"/> 複製分配結果</>}
                                                </button>
                                            </h3>
                                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                                {distributedHands.map((hand, idx) => {
                                                    const counts = countCards(hand);
                                                    return (
                                                        <div key={idx} className="bg-slate-50 p-5 rounded-xl border border-slate-200 relative overflow-hidden">
                                                            <div className="absolute top-0 right-0 p-4 opacity-10 font-black text-6xl select-none">{getPlayerLabel(idx)}</div>
                                                            <h4 className="font-bold text-lg text-slate-800 mb-3 flex items-center gap-2"><span className="bg-cyan-600 text-white w-8 h-8 rounded-full flex items-center justify-center text-sm">{getPlayerLabel(idx)}</span> 玩家 {getPlayerLabel(idx)}</h4>
                                                            <div className="space-y-2">
                                                                {Object.keys(counts).map(type => counts[type] > 0 && (
                                                                    <div key={type} className={`flex justify-between items-center text-sm px-2 py-1 rounded ${CARD_INFO[type].color} bg-opacity-20`}>
                                                                        <span>{CARD_INFO[type].name}</span><span className="font-bold">x {counts[type]}</span>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* ================= 學生模式 (計算機) ================= */}
                        {viewMode === 'student' && (
                            <div className="space-y-6 animate-fade-in">
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-cyan-100">
                                    <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2 mb-6"><Utensils className="w-6 h-6 text-cyan-600" /> 生物手牌 (輸入對戰最終結果)</h2>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                        {BASE_RATIO_CONFIG.map((card) => (
                                            <div key={card.type} className={`p-4 rounded-xl border-2 flex flex-col justify-between ${card.color} bg-opacity-10`}>
                                                <div className="flex justify-between items-start mb-2">
                                                    <span className="font-bold text-lg block">{card.name}</span>
                                                    <span className="bg-white px-2 py-1 rounded text-xs font-bold shadow-sm">{card.score} 分/張</span>
                                                </div>
                                                <div className="flex items-center justify-between bg-white/80 rounded-lg p-2 mt-2">
                                                    <button onClick={() => adjustHand(card.type, -1)} className="p-1.5 hover:bg-slate-100 rounded-md text-slate-600"><Minus className="w-4 h-4" /></button>
                                                    <span className="font-black text-2xl w-12 text-center text-slate-700">{ecosystemHand[card.type]}</span>
                                                    <button onClick={() => adjustHand(card.type, 1)} className="p-1.5 hover:bg-slate-100 rounded-md text-slate-600"><Plus className="w-4 h-4" /></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="mt-8 flex justify-center">
                                        <button onClick={calculateScore} className="px-10 py-4 bg-cyan-700 hover:bg-cyan-800 text-white text-xl font-bold rounded-xl shadow-lg transition-all active:scale-95 flex items-center gap-3"><Calculator className="w-6 h-6" /> 計算最終積分</button>
                                    </div>
                                </div>

                                {showResult && simulationResult && (
                                    <div id="results-section" className="bg-white rounded-2xl shadow-xl border-2 border-cyan-500 overflow-hidden animate-slide-up">
                                        <div className="bg-cyan-600 text-white p-6 flex justify-between items-center">
                                            <h2 className="text-2xl font-bold flex items-center gap-2"><Trophy className="w-8 h-8 text-yellow-300" /> 結算報告</h2>
                                            <div className="text-right"><div className="text-sm opacity-80">總得分</div><div className="text-4xl font-black text-yellow-300">{simulationResult.score}</div></div>
                                        </div>
                                        <div className="grid grid-cols-1 lg:grid-cols-2">
                                            <div className="p-6 bg-slate-50 border-r border-slate-200 max-h-[500px] overflow-y-auto">
                                                <h3 className="font-bold text-slate-700 mb-4 flex items-center gap-2"><Activity className="w-5 h-5" /> 生態鏈反應過程</h3>
                                                <div className="space-y-3 text-sm font-mono">
                                                    {simulationResult.logs.map((log, idx) => (
                                                        <div key={idx} className={`p-2 rounded border-l-4 ${log.type === 'success' ? 'bg-green-50 border-green-500 text-green-800' : log.type === 'fail' ? 'bg-red-50 border-red-500 text-red-800' : 'bg-white border-slate-300'}`}>{log.msg}</div>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className="p-6">
                                                <h3 className="font-bold text-slate-700 mb-4 flex items-center gap-2"><ShieldAlert className="w-5 h-5" /> 最終得分清單</h3>
                                                <div className="space-y-4">
                                                    {Object.keys(simulationResult.details).map(type => {
                                                        const data = simulationResult.details[type];
                                                        if (data.scoring === 0 && data.starved === 0 && ecosystemHand[type] === 0) return null;
                                                        return (
                                                            <div key={type} className="flex items-center justify-between border-b pb-2">
                                                                <div className="flex items-center gap-3">
                                                                    <span className="font-bold">{CARD_INFO[type].name}</span>
                                                                    <div className="text-xs flex gap-1">
                                                                        {data.starved > 0 && <span className="bg-slate-100 text-slate-500 px-1 rounded">餓死 {data.starved}</span>}
                                                                        {data.eaten > 0 && <span className="bg-red-50 text-red-400 px-1 rounded">被吃 {data.eaten}</span>}
                                                                    </div>
                                                                </div>
                                                                <div className="flex flex-col items-end">
                                                                    <span className="font-bold text-green-600">{data.scoring} 隻得分</span>
                                                                    {data.scoring > 0 && <span className="text-xs text-slate-400">+{data.scoring * CARD_INFO[type].score}分</span>}
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<OceanCardGame />);
    </script>
</body>
</html>
