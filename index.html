<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海洋生態食物鏈</title>
    
    <!-- 載入 Tailwind CSS (美化樣式) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 載入 React 和 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 載入 Babel (讓瀏覽器看得懂 JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @keyframes shimmer { 100% { transform: translateX(100%); } }
        .animate-shimmer { animation: shimmer 2s infinite; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        .animate-slide-up { animation: slideUp 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 拖放時的視覺回饋 */
        .drag-over { border-color: #06b6d4 !important; background-color: #ecfeff !important; }
    </style>
</head>
<body class="bg-cyan-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // --- 內建圖示元件 ---
        const IconBase = ({ children, className, ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
                {children}
            </svg>
        );

        const Fish = (props) => <IconBase {...props}><path d="M6.5 12c.94-3.46 4.96-6 8.5-6 3.54 0 6.46 2.31 7.5 5.5-1.04 3.19-3.96 5.5-7.5 5.5-3.54 0-7.56-2.54-8.5-6Z"/><path d="M18 12v.5"/></IconBase>;
        const Utensils = (props) => <IconBase {...props}><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></IconBase>;
        const Activity = (props) => <IconBase {...props}><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></IconBase>;
        const Plus = (props) => <IconBase {...props}><path d="M5 12h14"/><path d="M12 5v14"/></IconBase>;
        const Minus = (props) => <IconBase {...props}><path d="M5 12h14"/></IconBase>;
        const RefreshCw = (props) => <IconBase {...props}><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 21h-5v-5"/></IconBase>;
        const Trophy = (props) => <IconBase {...props}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></IconBase>;
        const Users = (props) => <IconBase {...props}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></IconBase>;
        const Calculator = (props) => <IconBase {...props}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></IconBase>;
        const ScrollText = (props) => <IconBase {...props}><path d="M8 21h12a2 2 0 0 0 2-2v-2a10 10 0 0 0-10-10c-5.52 0-10 4.48-10 10v2a2 2 0 0 0 2 2h2c1.66 0 3-1.34 3-3V9c0-1.1.9-2 2-2h4"/><path d="M19 17V5a2 2 0 0 0-2-2H4"/></IconBase>;
        const AlertCircle = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></IconBase>;
        const Copy = (props) => <IconBase {...props}><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></IconBase>;
        const Swords = (props) => <IconBase {...props}><polyline points="14.5 17.5 3 6 3 3 6 3 17.5 14.5"/><line x1="13" x2="19" y1="19" y2="13"/><line x1="16" x2="20" y1="16" y2="20"/><line x1="19" x2="21" y1="21" y2="19"/><polyline points="14.5 6.5 18 3 21 3 21 6 17.5 9.5"/><line x1="5" x2="9" y1="14" y2="10"/><line x1="17" x2="11" y1="11" y2="17"/><line x1="9" x2="7" y1="21" y2="19"/><line x1="11" x2="13" y1="15" y2="13"/></IconBase>;
        const Leaf = (props) => <IconBase {...props}><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.5 1 10-2.45 4-7.5 5.5-9 8Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></IconBase>;
        const ShieldAlert = (props) => <IconBase {...props}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></IconBase>;
        const GraduationCap = (props) => <IconBase {...props}><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></IconBase>;
        const School = (props) => <IconBase {...props}><path d="m4 6 8-4 8 4"/><path d="m18 10 4 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-8l4-2"/><path d="M14 22v-4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v4"/><path d="M18 5v17"/><path d="M6 5v17"/><circle cx="12" cy="9" r="2"/></IconBase>;
        const Network = (props) => <IconBase {...props}><rect x="16" y="16" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/><path d="M5 16v-3a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v3"/><path d="M12 8v4"/></IconBase>;

        // --- 設定檔與常數 ---
        const CardType = {
            ALGAE: 'algae',
            COPEPOD: 'copepod',
            KRILL: 'krill',
            HERRING: 'herring',
            SQUID: 'squid',
            SHARK: 'shark',
        };

        const BASE_RATIO_CONFIG = [
            { type: CardType.ALGAE, ratio: 10/36, name: '浮游藻類', score: 1, color: 'bg-green-100 border-green-500 text-green-800', desc: '無條件得分' },
            { type: CardType.COPEPOD, ratio: 7/36, name: '劍水蚤', score: 2, color: 'bg-yellow-100 border-yellow-500 text-yellow-800', desc: '需 2 藻類' },
            { type: CardType.KRILL, ratio: 7/36, name: '磷蝦', score: 2, color: 'bg-orange-100 border-orange-500 text-orange-800', desc: '需 2 藻類' },
            { type: CardType.HERRING, ratio: 6/36, name: '鯡魚', score: 3, color: 'bg-blue-100 border-blue-500 text-blue-800', desc: '需 3 藻類 + 1 劍水蚤' },
            { type: CardType.SQUID, ratio: 4/36, name: '烏賊', score: 3, color: 'bg-purple-100 border-purple-500 text-purple-800', desc: '需 2 磷蝦 + 1 劍水蚤' },
            { type: CardType.SHARK, ratio: 2/36, name: '鯊魚', score: 4, color: 'bg-red-100 border-red-500 text-red-800', desc: '需 2 鯡魚 + 2 烏賊' },
        ];

        const CARD_INFO = BASE_RATIO_CONFIG.reduce((acc, card) => {
            acc[card.type] = card;
            return acc;
        }, {});

        // 食物網階層設定 (用於情境教學)
        const TROPHIC_LEVELS = [
            { id: 'producer', name: '生產者', bgColor: 'bg-green-50', borderColor: 'border-green-400', textColor: 'text-green-700', expects: [CardType.ALGAE] },
            { id: 'primary', name: '初級消費者', bgColor: 'bg-yellow-50', borderColor: 'border-yellow-400', textColor: 'text-yellow-700', expects: [CardType.COPEPOD, CardType.KRILL] },
            { id: 'secondary', name: '次級消費者', bgColor: 'bg-orange-50', borderColor: 'border-orange-400', textColor: 'text-orange-700', expects: [CardType.HERRING, CardType.SQUID] },
            { id: 'tertiary', name: '三級消費者', bgColor: 'bg-red-50', borderColor: 'border-red-400', textColor: 'text-red-700', expects: [CardType.SHARK] },
        ];

        // --- 輔助函式 ---
        const generateDeckByPlayers = (numPlayers) => {
            const cardsPerPlayer = 5; 
            const totalCards = numPlayers * cardsPerPlayer; 
            let deck = [];
            BASE_RATIO_CONFIG.forEach(({ type, ratio }) => {
                const count = Math.round(totalCards * ratio);
                for (let i = 0; i < count; i++) {
                    deck.push(type);
                }
            });
            while (deck.length < totalCards) deck.push(CardType.ALGAE);
            while (deck.length > totalCards) deck.pop();
            return deck;
        };

        const shuffleDeck = (deck) => {
            const newDeck = [...deck];
            for (let i = newDeck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newDeck[i], newDeck[j]] = [newDeck[j], newDeck[i]];
            }
            return newDeck;
        };

        const countCards = (cardList) => {
            const counts = { [CardType.ALGAE]: 0, [CardType.COPEPOD]: 0, [CardType.KRILL]: 0, [CardType.HERRING]: 0, [CardType.SQUID]: 0, [CardType.SHARK]: 0 };
            cardList.forEach(type => { if (counts[type] !== undefined) counts[type]++; });
            return counts;
        };

        const getPlayerLabel = (index) => String.fromCharCode(65 + index);

        // --- 主程式元件 ---
        function OceanCardGame() {
            // viewMode: 'home' | 'teacher' | 'intro' | 'student'
            const [viewMode, setViewMode] = useState('home');
            
            // --- Intro (教學) State ---
            const [placements, setPlacements] = useState({
                [CardType.ALGAE]: null,
                [CardType.COPEPOD]: null,
                [CardType.KRILL]: null,
                [CardType.HERRING]: null,
                [CardType.SQUID]: null,
                [CardType.SHARK]: null,
            });
            const [introFeedback, setIntroFeedback] = useState(null);
            const [introSuccess, setIntroSuccess] = useState(false);

            // --- Teacher Mode State ---
            const [numPlayers, setNumPlayers] = useState(4); 
            const [distributedHands, setDistributedHands] = useState([]); 
            const [isDistributed, setIsDistributed] = useState(false);
            const [currentDeckSize, setCurrentDeckSize] = useState(36);
            const [copyFeedback, setCopyFeedback] = useState("");

            // --- Student Mode State ---
            const [ecosystemHand, setEcosystemHand] = useState(countCards([])); 
            const [simulationResult, setSimulationResult] = useState(null);
            const [showResult, setShowResult] = useState(false);

            // ================= 教學模式邏輯 =================
            const enterIntroMode = () => {
                setPlacements({
                    [CardType.ALGAE]: null, [CardType.COPEPOD]: null, [CardType.KRILL]: null,
                    [CardType.HERRING]: null, [CardType.SQUID]: null, [CardType.SHARK]: null,
                });
                setIntroFeedback(null);
                setIntroSuccess(false);
                setViewMode('intro');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleDragStart = (e, type) => {
                e.dataTransfer.setData('cardType', type);
            };

            const handleDrop = (e, levelId) => {
                e.preventDefault();
                e.currentTarget.classList.remove('drag-over');
                const type = e.dataTransfer.getData('cardType');
                if (type) {
                    setPlacements(prev => ({ ...prev, [type]: levelId }));
                    setIntroFeedback(null); // 清除提示
                }
            };

            const handleDragOver = (e) => {
                e.preventDefault();
            };

            const handleDragEnter = (e) => {
                e.preventDefault();
                e.currentTarget.classList.add('drag-over');
            };

            const handleDragLeave = (e) => {
                e.preventDefault();
                e.currentTarget.classList.remove('drag-over');
            };

            const verifyFoodWeb = () => {
                if (Object.values(placements).some(p => p === null)) {
                    setIntroFeedback({ type: 'error', msg: '請將所有的生物都拖拉到對應的階層中喔！' });
                    return;
                }

                let isAllCorrect = true;
                Object.keys(placements).forEach(type => {
                    const targetLevel = TROPHIC_LEVELS.find(l => l.id === placements[type]);
                    if (!targetLevel || !targetLevel.expects.includes(type)) {
                        isAllCorrect = false;
                    }
                });

                if (isAllCorrect) {
                    setIntroFeedback({ type: 'success', msg: '🎉 完全正確！你已經掌握了海洋食物網的關聯，準備好進入遊戲了嗎？' });
                    setIntroSuccess(true);
                } else {
                    setIntroFeedback({ type: 'error', msg: '🤔 好像有些生物的位置不對喔，請重新思考「誰吃誰」的關係再挑戰看看！' });
                    setIntroSuccess(false);
                }
            };

            // ================= 老師邏輯 =================
            const handleDistribute = () => {
                const fullDeck = generateDeckByPlayers(numPlayers);
                setCurrentDeckSize(fullDeck.length);
                const deck = shuffleDeck(fullDeck);
                const hands = Array.from({ length: numPlayers }, () => []);
                deck.forEach((card, index) => {
                    const playerIndex = index % numPlayers;
                    hands[playerIndex].push(card);
                });
                const sortedHands = hands.map(hand => hand.sort()); 
                setDistributedHands(sortedHands);
                setIsDistributed(true);
            };

            const handleCopyDistribution = async () => {
                let text = `🌊 海洋生態發牌結果 (總人數: ${numPlayers}, 總牌數: ${currentDeckSize})\n\n`;
                distributedHands.forEach((hand, idx) => {
                    const counts = countCards(hand);
                    let handStr = [];
                    Object.keys(counts).forEach(type => {
                        if (counts[type] > 0) {
                            handStr.push(`${CARD_INFO[type].name}x${counts[type]}`);
                        }
                    });
                    text += `👤 玩家 ${getPlayerLabel(idx)}: ${handStr.join(', ') || '無'}\n`;
                });
                
                const copyToClipboard = async (str) => {
                    if (navigator.clipboard && navigator.clipboard.writeText) {
                        try { await navigator.clipboard.writeText(str); return true; } 
                        catch (err) { console.warn("Clipboard API failed", err); }
                    }
                    try {
                        const textArea = document.createElement("textarea");
                        textArea.value = str;
                        textArea.style.position = "fixed";
                        document.body.appendChild(textArea);
                        textArea.select();
                        const successful = document.execCommand('copy');
                        document.body.removeChild(textArea);
                        return successful;
                    } catch (err) { return false; }
                };

                const success = await copyToClipboard(text);
                if (success) {
                    setCopyFeedback("已複製！");
                    setTimeout(() => setCopyFeedback(""), 2000);
                } else {
                    setCopyFeedback("複製失敗");
                    setTimeout(() => setCopyFeedback(""), 2000);
                }
            };

            // ================= 學生邏輯 =================
            const enterStudentMode = () => {
                setEcosystemHand(countCards([]));
                setSimulationResult(null);
                setShowResult(false);
                setViewMode('student');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const adjustHand = (type, delta) => {
                setEcosystemHand(prev => ({
                    ...prev,
                    [type]: Math.max(0, prev[type] + delta)
                }));
                setShowResult(false);
            };

            const calculateScore = () => {
                let foodPool = { ...ecosystemHand }; 
                let score = 0;
                let logs = []; 
                let details = {
                    [CardType.SHARK]: { scoring: 0, starved: 0 },
                    [CardType.HERRING]: { scoring: 0, starved: 0, eaten: 0 },
                    [CardType.SQUID]: { scoring: 0, starved: 0, eaten: 0 },
                    [CardType.COPEPOD]: { scoring: 0, starved: 0, eaten: 0 },
                    [CardType.KRILL]: { scoring: 0, starved: 0, eaten: 0 },
                    [CardType.ALGAE]: { scoring: 0, starved: 0, eaten: 0 },
                };

                const addLog = (msg, type = 'info') => logs.push({ msg, type });

                addLog("--- 開始生態結算 (食物網大亂鬥) ---", 'header');
                
                // 1. 鯊魚
                addLog(`【頂級掠食者】鯊魚進食 (數量: ${ecosystemHand[CardType.SHARK]})`);
                for (let i = 0; i < ecosystemHand[CardType.SHARK]; i++) {
                    if (foodPool[CardType.HERRING] >= 2 && foodPool[CardType.SQUID] >= 2) {
                        details[CardType.SHARK].scoring++;
                        foodPool[CardType.HERRING] -= 2;
                        foodPool[CardType.SQUID] -= 2;
                        details[CardType.HERRING].eaten += 2;
                        details[CardType.SQUID].eaten += 2;
                        addLog(`✅ 鯊魚 #${i+1} 捕食成功`, 'success');
                    } else {
                        details[CardType.SHARK].starved++;
                        addLog(`💀 鯊魚 #${i+1} 食物不足`, 'fail');
                    }
                }

                // 2. 鯡魚
                const totalHerrings = ecosystemHand[CardType.HERRING];
                for (let i = 0; i < totalHerrings; i++) {
                    if (foodPool[CardType.ALGAE] >= 3 && foodPool[CardType.COPEPOD] >= 1) {
                        details[CardType.HERRING].scoring++;
                        foodPool[CardType.ALGAE] -= 3;
                        foodPool[CardType.COPEPOD] -= 1;
                        details[CardType.ALGAE].eaten += 3;
                        details[CardType.COPEPOD].eaten += 1;
                    } else {
                        details[CardType.HERRING].starved++;
                    }
                }

                // 3. 烏賊
                const totalSquids = ecosystemHand[CardType.SQUID];
                for (let i = 0; i < totalSquids; i++) {
                    if (foodPool[CardType.KRILL] >= 2 && foodPool[CardType.COPEPOD] >= 1) {
                        details[CardType.SQUID].scoring++;
                        foodPool[CardType.KRILL] -= 2;
                        foodPool[CardType.COPEPOD] -= 1;
                        details[CardType.KRILL].eaten += 2;
                        details[CardType.COPEPOD].eaten += 1;
                    } else {
                        details[CardType.SQUID].starved++;
                    }
                }

                // 4. 劍水蚤
                const totalCopepods = ecosystemHand[CardType.COPEPOD];
                for (let i = 0; i < totalCopepods; i++) {
                    if (foodPool[CardType.ALGAE] >= 2) {
                        details[CardType.COPEPOD].scoring++;
                        foodPool[CardType.ALGAE] -= 2;
                        details[CardType.ALGAE].eaten += 2;
                    } else {
                        details[CardType.COPEPOD].starved++;
                    }
                }

                // 5. 磷蝦
                const totalKrills = ecosystemHand[CardType.KRILL];
                for (let i = 0; i < totalKrills; i++) {
                    if (foodPool[CardType.ALGAE] >= 2) {
                        details[CardType.KRILL].scoring++;
                        foodPool[CardType.ALGAE] -= 2;
                        details[CardType.ALGAE].eaten += 2;
                    } else {
                        details[CardType.KRILL].starved++;
                    }
                }

                // 6. 藻類
                details[CardType.ALGAE].scoring = ecosystemHand[CardType.ALGAE];

                // 總分計算
                Object.keys(details).forEach(type => {
                    score += details[type].scoring * CARD_INFO[type].score;
                });

                setSimulationResult({ score, details, logs });
                setShowResult(true);
                
                setTimeout(() => { document.getElementById('results-section')?.scrollIntoView({ behavior: 'smooth' }); }, 100);
            };

            const calculatedTotalCards = numPlayers * 5;

            return (
                <div className="min-h-screen bg-cyan-50 p-4 md:p-8 font-sans text-slate-800">
                    <div className="max-w-5xl mx-auto space-y-6">
                        
                        {/* Header */}
                        <header className="flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-cyan-100">
                            <div>
                                <h1 
                                    className="text-3xl font-bold text-cyan-800 flex items-center gap-2 cursor-pointer hover:opacity-80 transition-opacity"
                                    onClick={() => setViewMode('home')}
                                >
                                    <Fish className="w-8 h-8" />
                                    海洋生態食物鏈
                                </h1>
                                {viewMode !== 'home' && (
                                    <div className="flex items-center gap-2 mt-2">
                                        <span className={`px-3 py-1 rounded-full text-sm font-bold ${viewMode === 'teacher' ? 'bg-cyan-600 text-white' : 'bg-slate-100 text-slate-400'}`}>
                                            老師發牌區
                                        </span>
                                        <span className={`px-3 py-1 rounded-full text-sm font-bold ${viewMode === 'intro' ? 'bg-indigo-500 text-white' : 'bg-slate-100 text-slate-400'}`}>
                                            食物網教學
                                        </span>
                                        <span className={`px-3 py-1 rounded-full text-sm font-bold ${viewMode === 'student' ? 'bg-orange-500 text-white' : 'bg-slate-100 text-slate-400'}`}>
                                            學生計算機
                                        </span>
                                    </div>
                                )}
                            </div>
                            
                            {viewMode !== 'home' && (
                                <button 
                                    onClick={() => setViewMode('home')}
                                    className="mt-4 md:mt-0 px-4 py-2 text-sm text-slate-500 hover:bg-slate-100 rounded-lg transition-colors flex items-center gap-2"
                                >
                                    <School className="w-4 h-4" />
                                    回首頁
                                </button>
                            )}
                        </header>

                        {/* ================= 首頁：身分選擇 ================= */}
                        {viewMode === 'home' && (
                            <div className="py-12 animate-fade-in">
                                <div className="text-center mb-10">
                                    <h2 className="text-2xl text-slate-600 font-bold mb-2">請選擇您的任務</h2>
                                    <p className="text-slate-400">學生請先完成情境教學，再進入對戰計算機</p>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-5xl mx-auto px-4">
                                    
                                    {/* 老師模式 */}
                                    <button 
                                        onClick={() => setViewMode('teacher')}
                                        className="group relative bg-white p-8 rounded-3xl shadow-md border-2 border-cyan-100 hover:border-cyan-500 hover:shadow-xl transition-all duration-300 flex flex-col items-center gap-4"
                                    >
                                        <div className="w-16 h-16 bg-cyan-100 rounded-full flex items-center justify-center group-hover:scale-110 transition-transform">
                                            <GraduationCap className="w-8 h-8 text-cyan-700" />
                                        </div>
                                        <h3 className="text-xl font-bold text-slate-800">我是老師</h3>
                                        <p className="text-slate-500 text-sm text-center">設定人數、進行亂數發牌<br/>並將結果分享</p>
                                        <div className="mt-auto pt-4 px-6 py-2 bg-cyan-50 text-cyan-700 rounded-full font-bold text-sm group-hover:bg-cyan-600 group-hover:text-white transition-colors">
                                            進入發牌系統
                                        </div>
                                    </button>

                                    {/* 食物網教學 (新功能) */}
                                    <button 
                                        onClick={enterIntroMode}
                                        className="group relative bg-white p-8 rounded-3xl shadow-md border-2 border-indigo-100 hover:border-indigo-500 hover:shadow-xl transition-all duration-300 flex flex-col items-center gap-4 transform md:-translate-y-4"
                                    >
                                        <div className="absolute -top-3 right-4 bg-indigo-500 text-white text-xs font-bold px-3 py-1 rounded-full shadow-sm animate-bounce">
                                            學生第一步
                                        </div>
                                        <div className="w-20 h-20 bg-indigo-100 rounded-full flex items-center justify-center group-hover:scale-110 transition-transform">
                                            <Network className="w-10 h-10 text-indigo-600" />
                                        </div>
                                        <h3 className="text-2xl font-bold text-slate-800">食物網教學</h3>
                                        <p className="text-slate-500 text-sm text-center">了解誰吃誰的關係<br/>建立生態階層概念</p>
                                        <div className="mt-auto pt-4 w-full">
                                            <div className="px-6 py-3 bg-indigo-600 text-white rounded-full font-bold text-sm text-center shadow-lg group-hover:bg-indigo-700 transition-colors">
                                                開始情境配對
                                            </div>
                                        </div>
                                    </button>

                                    {/* 學生模式 */}
                                    <button 
                                        onClick={enterStudentMode}
                                        className="group relative bg-white p-8 rounded-3xl shadow-md border-2 border-orange-100 hover:border-orange-500 hover:shadow-xl transition-all duration-300 flex flex-col items-center gap-4"
                                    >
                                        <div className="w-16 h-16 bg-orange-100 rounded-full flex items-center justify-center group-hover:scale-110 transition-transform">
                                            <Swords className="w-8 h-8 text-orange-600" />
                                        </div>
                                        <h3 className="text-xl font-bold text-slate-800">戰鬥計算機</h3>
                                        <p className="text-slate-500 text-sm text-center">輸入手牌、進行對戰<br/>最後計算積分</p>
                                        <div className="mt-auto pt-4 px-6 py-2 bg-orange-50 text-orange-700 rounded-full font-bold text-sm group-hover:bg-orange-600 group-hover:text-white transition-colors">
                                            進入學生系統
                                        </div>
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* ================= 食物網教學 (Intro Mode) ================= */}
                        {viewMode === 'intro' && (
                            <div className="space-y-6 animate-fade-in">
                                <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-indigo-100">
                                    <div className="text-center max-w-2xl mx-auto mb-8">
                                        <h2 className="text-2xl font-bold text-indigo-800 mb-2">生態情境配對任務</h2>
                                        <p className="text-slate-600">在開始遊戲之前，請先將下方的「海洋生物」拖拉放到正確的「生態階層」框框中，建立食物網的概念！</p>
                                    </div>

                                    {/* 階層放置區 */}
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                                        {TROPHIC_LEVELS.map(level => (
                                            <div 
                                                key={level.id}
                                                onDrop={(e) => handleDrop(e, level.id)}
                                                onDragOver={handleDragOver}
                                                onDragEnter={handleDragEnter}
                                                onDragLeave={handleDragLeave}
                                                className={`flex flex-col rounded-xl border-2 border-dashed ${level.borderColor} ${level.bgColor} transition-all min-h-[140px]`}
                                            >
                                                <div className={`text-center font-bold py-2 border-b-2 border-dashed ${level.borderColor} ${level.textColor} bg-white/50 rounded-t-lg`}>
                                                    {level.name}
                                                </div>
                                                <div className="flex-1 p-3 flex flex-wrap content-start gap-2">
                                                    {Object.keys(placements).filter(type => placements[type] === level.id).map(type => (
                                                        <div 
                                                            key={type}
                                                            draggable
                                                            onDragStart={(e) => handleDragStart(e, type)}
                                                            className={`cursor-move px-3 py-2 rounded-lg border-2 shadow-sm text-sm font-bold bg-white ${CARD_INFO[type].color}`}
                                                        >
                                                            {CARD_INFO[type].name}
                                                        </div>
                                                    ))}
                                                    {Object.values(placements).filter(v => v === level.id).length === 0 && (
                                                        <span className="text-slate-400 text-sm w-full text-center mt-4">拖拉至此</span>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    {/* 待放置生物區 */}
                                    <div className="bg-slate-50 rounded-xl p-4 md:p-6 border border-slate-200">
                                        <h3 className="text-slate-500 font-bold mb-4 text-center">海洋生物列表 (請將它們拖移到上方)</h3>
                                        <div 
                                            className="flex flex-wrap justify-center gap-3 min-h-[60px]"
                                            onDrop={(e) => handleDrop(e, null)}
                                            onDragOver={handleDragOver}
                                            onDragEnter={handleDragEnter}
                                            onDragLeave={handleDragLeave}
                                        >
                                            {Object.keys(placements).filter(type => placements[type] === null).map(type => (
                                                <div 
                                                    key={type}
                                                    draggable
                                                    onDragStart={(e) => handleDragStart(e, type)}
                                                    className={`cursor-move px-4 py-3 rounded-xl border-2 shadow-sm font-bold bg-white hover:scale-105 transition-transform ${CARD_INFO[type].color}`}
                                                >
                                                    {CARD_INFO[type].name}
                                                    <span className="block text-xs font-normal opacity-70 mt-1">{CARD_INFO[type].desc}</span>
                                                </div>
                                            ))}
                                            {Object.values(placements).every(v => v !== null) && (
                                                <div className="text-slate-400 italic flex items-center h-full">所有生物皆已分配！</div>
                                            )}
                                        </div>
                                    </div>

                                    {/* 驗證區 */}
                                    <div className="mt-8 flex flex-col items-center">
                                        {!introSuccess ? (
                                            <button 
                                                onClick={verifyFoodWeb}
                                                className="px-8 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-full shadow-lg transition-all active:scale-95"
                                            >
                                                驗證答案
                                            </button>
                                        ) : (
                                            <button 
                                                onClick={enterStudentMode}
                                                className="px-8 py-3 bg-orange-500 hover:bg-orange-600 text-white font-bold rounded-full shadow-lg transition-all active:scale-95 flex items-center gap-2 animate-bounce"
                                            >
                                                <Swords className="w-5 h-5" />
                                                開始進入遊戲對戰！
                                            </button>
                                        )}

                                        {introFeedback && (
                                            <div className={`mt-4 p-4 rounded-lg border flex items-center gap-2 max-w-lg w-full ${introFeedback.type === 'success' ? 'bg-green-50 border-green-200 text-green-700' : 'bg-red-50 border-red-200 text-red-700'}`}>
                                                {introFeedback.type === 'success' ? <Leaf className="w-5 h-5 shrink-0" /> : <AlertCircle className="w-5 h-5 shrink-0" />}
                                                <span>{introFeedback.msg}</span>
                                            </div>
                                        )}
                                    </div>

                                </div>
                            </div>
                        )}

                        {/* ================= 老師模式：分組發牌 (原有邏輯不變) ================= */}
                        {viewMode === 'teacher' && (
                            // ... 原有的 teacher mode 程式碼，完全保留不變 ...
                            <div className="space-y-6 animate-fade-in">
                                <div className="bg-white p-8 rounded-2xl shadow-sm border border-cyan-100">
                                    <div className="flex flex-col md:flex-row items-end gap-6 mb-8">
                                        <div className="flex-1 w-full">
                                            <label className="block text-lg font-bold text-slate-700 mb-2 flex items-center gap-2">
                                                <Users className="w-5 h-5" />
                                                請輸入「總遊戲人數」
                                            </label>
                                            <div className="flex items-center gap-4">
                                                <input 
                                                    type="number" 
                                                    min="1" 
                                                    max="100"
                                                    value={numPlayers}
                                                    onChange={(e) => setNumPlayers(Math.max(1, Math.min(100, parseInt(e.target.value) || 1)))}
                                                    className="w-full text-3xl font-bold text-center px-4 py-4 rounded-xl border-2 border-slate-200 focus:border-cyan-500 focus:ring-4 focus:ring-cyan-100 outline-none transition-all"
                                                />
                                                <div className="text-sm text-slate-500 whitespace-nowrap">
                                                    預計發出: <span className="font-bold text-cyan-600 text-lg">{calculatedTotalCards}</span> 張牌
                                                    <span className="block text-xs text-slate-400 mt-1">(每人固定 5 張)</span>
                                                </div>
                                            </div>
                                        </div>
                                        <button 
                                            onClick={handleDistribute}
                                            className="w-full md:w-auto px-8 py-4 bg-cyan-600 hover:bg-cyan-700 text-white text-xl font-bold rounded-xl shadow-lg hover:shadow-cyan-200 transition-all active:scale-95 flex items-center justify-center gap-2"
                                        >
                                            <RefreshCw className="w-6 h-6" />
                                            亂數發牌
                                        </button>
                                    </div>

                                    {isDistributed && (
                                        <div className="space-y-6">
                                            <h3 className="text-xl font-bold text-slate-700 border-b pb-2 flex justify-between items-center">
                                                <span>發牌結果</span>
                                                <button 
                                                    onClick={handleCopyDistribution}
                                                    className="flex items-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-lg text-sm font-bold transition-colors"
                                                >
                                                    {copyFeedback ? <span className="text-green-600">{copyFeedback}</span> : <><Copy className="w-4 h-4"/> 複製分配結果</>}
                                                </button>
                                            </h3>
                                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                                {distributedHands.map((hand, idx) => {
                                                    const counts = countCards(hand);
                                                    return (
                                                        <div key={idx} className="bg-slate-50 p-5 rounded-xl border border-slate-200 relative overflow-hidden">
                                                            <div className="absolute top-0 right-0 p-4 opacity-10 font-black text-6xl select-none">
                                                                {getPlayerLabel(idx)}
                                                            </div>
                                                            <h4 className="font-bold text-lg text-slate-800 mb-3 flex items-center gap-2">
                                                                <span className="bg-cyan-600 text-white w-8 h-8 rounded-full flex items-center justify-center text-sm">
                                                                    {getPlayerLabel(idx)}
                                                                </span>
                                                                玩家 {getPlayerLabel(idx)}
                                                            </h4>
                                                            <div className="space-y-2">
                                                                {Object.keys(counts).map(type => {
                                                                    if (counts[type] === 0) return null;
                                                                    const info = CARD_INFO[type];
                                                                    return (
                                                                        <div key={type} className={`flex justify-between items-center text-sm px-2 py-1 rounded ${info.color} bg-opacity-20`}>
                                                                            <span>{info.name}</span>
                                                                            <span className="font-bold">x {counts[type]}</span>
                                                                        </div>
                                                                    );
                                                                })}
                                                                {hand.length === 0 && <span className="text-slate-400 text-sm">沒有卡牌</span>}
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* ================= 學生模式：食物網大亂鬥 (原有邏輯不變) ================= */}
                        {viewMode === 'student' && (
                            // ... 原有的 student mode 程式碼，完全保留不變 ...
                            <div className="space-y-6 animate-fade-in">
                                
                                <div className="bg-blue-50 border-l-4 border-blue-500 p-6 rounded-r-xl shadow-sm">
                                    <h3 className="text-lg font-bold text-blue-800 flex items-center gap-2 mb-4">
                                        <ScrollText className="w-5 h-5" />
                                        遊戲操作指引
                                    </h3>
                                    <ol className="space-y-3 text-slate-700 text-sm md:text-base list-decimal list-inside">
                                        <li className="pl-2">
                                            <span className="font-bold text-slate-900">手動調整</span>：請先依據分到的牌，在下方「生物手牌」區域調整自己的初始數量。
                                        </li>
                                        <li className="pl-2">
                                            <span className="font-bold text-slate-900">選定角色與對戰</span>：選定自己想當的生物後，找對手進行猜拳。
                                        </li>
                                        <li className="pl-2 bg-white/50 p-3 rounded-lg border border-blue-100">
                                            <span className="font-bold text-red-600 block mb-2">⚔️ 掠食關係對戰規則 (猜拳)：</span>
                                            
                                            <div className="overflow-x-auto">
                                                <table className="min-w-full text-sm text-left text-slate-600 mb-2">
                                                    <thead className="bg-blue-100 text-blue-800">
                                                        <tr>
                                                            <th className="px-3 py-2 rounded-tl-lg">猜拳結果</th>
                                                            <th className="px-3 py-2">對【掠食者】影響</th>
                                                            <th className="px-3 py-2 rounded-tr-lg">對【獵物】影響</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-blue-100 bg-white">
                                                        <tr>
                                                            <td className="px-3 py-2 font-bold text-slate-800">
                                                                掠食者贏
                                                                <span className="block text-xs font-normal text-slate-500">獵物被吃掉</span>
                                                            </td>
                                                            <td className="px-3 py-2 text-green-600 font-bold bg-green-50">獲得獵物卡牌 +1</td>
                                                            <td className="px-3 py-2 text-red-600 font-bold bg-red-50">失去獵物卡牌 -1</td>
                                                        </tr>
                                                        <tr>
                                                            <td className="px-3 py-2 font-bold text-slate-800">
                                                                獵物贏
                                                                <span className="block text-xs font-normal text-slate-500">獵物逃跑又繁殖</span>
                                                            </td>
                                                            <td className="px-3 py-2 text-slate-400">無事發生</td>
                                                            <td className="px-3 py-2 text-green-600 font-bold bg-green-50">獲得獵物卡牌 +1</td>
                                                        </tr>
                                                    </tbody>
                                                </table>
                                            </div>

                                            <div className="text-green-700 flex items-start gap-1 mt-2 bg-green-100 p-2 rounded border border-green-200">
                                                <Leaf className="w-4 h-4 mt-0.5 shrink-0" />
                                                <span><span className="font-bold">特例 (藻類免死金牌)</span>：浮游藻類數量若歸零，請自動再生成 1 張。</span>
                                            </div>
                                        </li>
                                        <li className="pl-2">
                                            <span className="font-bold text-slate-900">非掠食關係</span>：無法猜拳，無事發生。
                                        </li>
                                        <li className="pl-2">
                                            <span className="font-bold text-slate-900">最終結算</span>：時間到後，請更新下方卡片數量，並按「計算最終積分」。
                                            <span className="block text-xs text-red-500 mt-1 ml-4">* 注意：每個角色仍需滿足足夠的進食條件(如右下角說明)才會計算分數！</span>
                                        </li>
                                    </ol>
                                </div>

                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-cyan-100">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                                            <Utensils className="w-6 h-6 text-cyan-600" />
                                            生物手牌 (請輸入最終結果)
                                        </h2>
                                    </div>

                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                        {BASE_RATIO_CONFIG.map((card) => (
                                            <div key={card.type} className={`p-4 rounded-xl border-2 flex flex-col justify-between transition-colors ${card.color} bg-opacity-10 border-opacity-50 hover:border-opacity-100`}>
                                                <div className="flex justify-between items-start mb-2">
                                                    <div>
                                                        <span className="font-bold text-lg block">{card.name}</span>
                                                        <span className="text-xs opacity-70 block">{card.desc}</span>
                                                    </div>
                                                    <span className="bg-white px-2 py-1 rounded text-xs font-bold shadow-sm border border-slate-100 text-slate-600">
                                                        {card.score} 分/張
                                                    </span>
                                                </div>

                                                <div className="flex items-center justify-between bg-white/80 rounded-lg p-2 mt-2 backdrop-blur-sm">
                                                    <button 
                                                        onClick={() => adjustHand(card.type, -1)}
                                                        className="p-1.5 hover:bg-slate-100 rounded-md transition-colors text-slate-600 active:bg-slate-200"
                                                    >
                                                        <Minus className="w-4 h-4" />
                                                    </button>
                                                    <span className="font-black text-2xl w-12 text-center text-slate-700">
                                                        {ecosystemHand[card.type]}
                                                    </span>
                                                    <button 
                                                        onClick={() => adjustHand(card.type, 1)}
                                                        className="p-1.5 hover:bg-slate-100 rounded-md transition-colors text-slate-600 active:bg-slate-200"
                                                    >
                                                        <Plus className="w-4 h-4" />
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="mt-8 flex justify-center">
                                        <button 
                                            onClick={calculateScore}
                                            className="group relative px-10 py-4 bg-cyan-700 hover:bg-cyan-800 text-white text-xl font-bold rounded-xl shadow-lg transition-all active:scale-95 flex items-center gap-3 overflow-hidden"
                                        >
                                            <div className="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:animate-shimmer" />
                                            <Calculator className="w-6 h-6" />
                                            計算最終積分
                                        </button>
                                    </div>
                                </div>

                                {showResult && simulationResult && (
                                    <div id="results-section" className="bg-white rounded-2xl shadow-xl border-2 border-cyan-500 overflow-hidden animate-slide-up">
                                        <div className="bg-cyan-600 text-white p-6 flex justify-between items-center flex-wrap gap-4">
                                            <h2 className="text-2xl font-bold flex items-center gap-2">
                                                <Trophy className="w-8 h-8 text-yellow-300" />
                                                結算報告
                                            </h2>
                                            <div className="text-right">
                                                <div className="text-sm opacity-80">最終總得分</div>
                                                <div className="text-4xl font-black text-yellow-300">{simulationResult.score}</div>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 lg:grid-cols-2">
                                            <div className="p-6 bg-slate-50 border-r border-slate-200 max-h-[500px] overflow-y-auto">
                                                <h3 className="font-bold text-slate-700 mb-4 flex items-center gap-2">
                                                    <Activity className="w-5 h-5" />
                                                    生態鏈反應過程
                                                </h3>
                                                <div className="space-y-3 text-sm font-mono">
                                                    {simulationResult.logs.map((log, idx) => (
                                                        <div 
                                                            key={idx} 
                                                            className={`p-2 rounded border-l-4 ${
                                                                log.type === 'header' ? 'bg-slate-200 border-slate-500 font-bold text-center' :
                                                                log.type === 'success' ? 'bg-green-50 border-green-500 text-green-800' :
                                                                log.type === 'fail' ? 'bg-red-50 border-red-500 text-red-800' :
                                                                log.type === 'summary' ? 'bg-blue-50 border-blue-400 text-blue-800 font-bold' :
                                                                'bg-white border-slate-300'
                                                            }`}
                                                        >
                                                            {log.msg}
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>

                                            <div className="p-6">
                                                <h3 className="font-bold text-slate-700 mb-4 flex items-center gap-2">
                                                    <ShieldAlert className="w-5 h-5" />
                                                    最終得分清單
                                                </h3>
                                                <div className="bg-yellow-50 p-3 rounded-lg text-sm text-yellow-800 mb-4 flex items-start gap-2">
                                                    <AlertCircle className="w-4 h-4 mt-0.5 shrink-0" />
                                                    <p>注意：根據規則，即使被捕食者吃掉的生物，只要其自身食物充足，依然計算得分！</p>
                                                </div>

                                                <div className="space-y-4">
                                                    {Object.keys(simulationResult.details).map(type => {
                                                        const info = CARD_INFO[type];
                                                        const data = simulationResult.details[type];
                                                        if (data.scoring === 0 && data.starved === 0 && ecosystemHand[type] === 0) return null;

                                                        return (
                                                            <div key={type} className="flex items-center justify-between border-b border-slate-100 pb-2 last:border-0">
                                                                <div className="flex items-center gap-3">
                                                                    <span className={`font-bold ${data.scoring > 0 ? 'text-slate-800' : 'text-slate-400'}`}>
                                                                        {info.name}
                                                                    </span>
                                                                    <div className="text-xs space-x-1 flex flex-wrap gap-1">
                                                                        {data.starved > 0 && <span className="bg-slate-100 text-slate-500 px-1 rounded">餓死 {data.starved}</span>}
                                                                        {data.eaten > 0 && (
                                                                            <span className="bg-red-50 text-red-400 px-1 rounded border border-red-100" title="雖被捕食但仍計算得分">
                                                                                被吃 {data.eaten} (仍計分)
                                                                            </span>
                                                                        )}
                                                                    </div>
                                                                </div>
                                                                <div className="flex flex-col items-end">
                                                                    <span className={`font-bold text-lg ${data.scoring > 0 ? 'text-green-600' : 'text-slate-300'}`}>
                                                                        {data.scoring} 隻得分
                                                                    </span>
                                                                    {data.scoring > 0 && <span className="text-xs text-slate-400">+{data.scoring * info.score}分</span>}
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // 啟動 React App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<OceanCardGame />);
    </script>
</body>
</html>
