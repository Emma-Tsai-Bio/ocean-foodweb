                                                        {Object.values(myInventory).every(v => v===0) && <span className="text-sm text-slate-400 italic py-1">目前背包空空如也...</span>}
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="bg-orange-50/50 p-5 rounded-xl border border-orange-100">
                                                <h3 className="font-bold text-slate-700 mb-4 text-center">🎯 你遇到了哪一種生物？ (請點選)</h3>
                                                <div className="grid grid-cols-3 md:grid-cols-6 gap-2">
                                                    {BASE_RATIO_CONFIG.map(card => (
                                                        <button key={card.type} onClick={() => { setEncounterTarget(card.type); setSameWinPhase(false); }} className={`py-2 px-1 rounded-lg border text-sm font-bold transition-all ${encounterTarget === card.type ? 'bg-slate-800 text-white scale-105 shadow-md border-slate-800' : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-100'}`}>
                                                            {card.name}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>

                                            {encounterTarget && (() => {
                                                const relation = getEncounterRelation(myRole, encounterTarget);
                                                const targetInfo = CARD_INFO[encounterTarget];
                                                
                                                if (relation === 'NONE') return (
                                                    <div className="bg-slate-100 p-6 rounded-xl text-center border border-slate-200 animate-slide-up">
                                                        <span className="text-2xl block mb-2">👀</span>
                                                        <h4 className="font-bold text-slate-700 mb-4">沒有掠食關係</h4>
                                                        <button onClick={() => setEncounterTarget(null)} className="px-6 py-2 bg-slate-500 hover:bg-slate-600 text-white font-bold rounded-lg shadow-sm transition-all">關閉，尋找下一個目標</button>
                                                    </div>
                                                );
                                                
                                                if (relation === 'SAME') return (
                                                    <div className="bg-indigo-50 p-6 rounded-xl border-2 border-indigo-200 animate-slide-up text-center">
                                                        <h4 className="font-black text-indigo-700 text-xl mb-2 flex items-center justify-center gap-2">🧬 遇到同類！</h4>
                                                        
                                                        {!sameWinPhase ? (
                                                            <>
                                                                <p className="text-indigo-900 mb-6 font-medium">請進行實體猜拳，贏家可獲得繁衍或救援的機會！</p>
                                                                <div className="flex flex-col md:flex-row gap-3 justify-center">
                                                                    <button onClick={() => setSameWinPhase(true)} className="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-md transition-all active:scale-95">✊✌️🖐️ 我贏了</button>
                                                                    <button onClick={() => handleCombatResult('lose', relation, encounterTarget)} className="px-6 py-3 bg-white text-slate-500 border border-slate-300 hover:bg-slate-50 font-bold rounded-xl transition-all">✊✌️🖐️ 我輸了</button>
                                                                </div>
                                                            </>
                                                        ) : (
                                                            <div className="animate-fade-in">
                                                                <p className="text-indigo-900 mb-6 font-medium">🎉 恭喜猜贏！請選擇你的勝利行動：</p>
                                                                <div className="flex flex-col gap-3 justify-center">
                                                                    <button onClick={() => { setSameWinPhase(false); handleCombatResult('win_revive', relation, encounterTarget); }} className="px-6 py-3 bg-blue-500 hover:bg-blue-600 text-white font-bold rounded-xl shadow-md transition-all active:scale-95">✨ 去死亡區復活隊友</button>
                                                                    <button onClick={() => { setSameWinPhase(false); handleCombatResult('win_clone', relation, encounterTarget); }} className="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-md transition-all active:scale-95">🧬 製造虛擬分身 (+1 數量)</button>
                                                                    <button onClick={() => setSameWinPhase(false)} className="mt-2 text-slate-500 underline text-sm hover:text-slate-700 transition-colors">返回重選</button>
                                                                </div>
                                                            </div>
                                                        )}
                                                    </div>
                                                );

                                                if (relation === 'PREDATOR') return (
                                                    <div className="bg-red-50 p-6 rounded-xl border-2 border-red-200 animate-slide-up text-center">
                                                        <h4 className="font-black text-red-700 text-xl mb-2 flex items-center justify-center gap-2">⚠️ 掠食關係！你是【捕食者】</h4>
                                                        <p className="text-red-900 mb-6 font-medium">準備獵殺 {targetInfo.name}，請進行實體猜拳！</p>
                                                        <div className="flex flex-col md:flex-row gap-3 justify-center">
                                                            <button onClick={() => handleCombatResult('win', relation, encounterTarget)} className="px-6 py-3 bg-red-600 hover:bg-red-700 text-white font-bold rounded-xl shadow-md transition-all active:scale-95">✊✌️🖐️ 我贏了</button>
                                                            <button onClick={() => handleCombatResult('lose', relation, encounterTarget)} className="px-6 py-3 bg-white text-slate-500 border border-slate-300 hover:bg-slate-50 font-bold rounded-xl transition-all">✊✌️🖐️ 我輸了</button>
                                                        </div>
                                                    </div>
                                                );

                                                if (relation === 'PREY') return (
                                                    <div className="bg-emerald-50 p-6 rounded-xl border-2 border-emerald-200 animate-slide-up text-center">
                                                        <h4 className="font-black text-emerald-700 text-xl mb-2 flex items-center justify-center gap-2">⚠️ 掠食關係！你是【獵物】</h4>
                                                        <p className="text-emerald-900 mb-6 font-medium">遭遇 {targetInfo.name} 攻擊，請進行實體猜拳求生！</p>
                                                        <div className="flex flex-col md:flex-row gap-3 justify-center">
                                                            <button onClick={() => handleCombatResult('win', relation, encounterTarget)} className="px-6 py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl shadow-md transition-all active:scale-95">✊✌️🖐️ 我贏了 (逃跑成功)</button>
                                                            <button onClick={() => handleCombatResult('lose', relation, encounterTarget)} className="px-6 py-3 bg-slate-800 text-white hover:bg-slate-900 font-bold rounded-xl shadow-md transition-all">✊✌️🖐️ 我輸了 (被吃掉一隻)</button>
                                                        </div>
                                                    </div>
                                                );
                                            })()}
                                        </div>
                                    )}
                                </div>
                                
                                {/* 移至極簡結算按鈕 */}
                                <div className="mt-8 flex justify-center pb-8 border-t border-slate-200 pt-8">
                                    <button onClick={goToCheckout} className="px-8 py-4 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-full shadow-lg transition-all active:scale-95 flex items-center gap-2">
                                        <Calculator className="w-6 h-6" /> 遊戲結束，計算我的得分
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* ================= 學生：團隊戰 - 個人極簡結算中心 ================= */}
                        {viewMode === 'student_team_checkout' && personalResult && (
                            <div className="space-y-6 animate-fade-in">
                                <div className="bg-white rounded-2xl shadow-xl border-4 border-emerald-500 overflow-hidden">
                                    <div className="bg-emerald-600 text-white p-8 text-center relative">
                                        <Trophy className="w-16 h-16 text-yellow-300 mx-auto mb-4" />
                                        <h2 className="text-3xl font-black mb-2">個人結算報告</h2>
                                        <p className="opacity-90">請將此總分回報給你的小組長，加總為小組總分</p>
                                    </div>
                                    
                                    <div className="p-8 space-y-6">
                                        <div className="flex items-center justify-between border-b pb-6">
                                            <div>
                                                <div className="text-slate-500 font-bold mb-1">我的角色與數量</div>
                                                <div className={`inline-flex items-center gap-2 px-3 py-1.5 rounded-lg font-bold text-lg ${myRole ? CARD_INFO[myRole].color : 'bg-slate-100 text-slate-500'}`}>
                                                    {myRole ? CARD_INFO[myRole].name : '無'} <span className="text-slate-800 bg-white px-2 py-0.5 rounded">x {myCount}</span>
                                                </div>
                                            </div>
                                            <div className="text-right">
                                                <div className="text-slate-500 font-bold mb-1">基礎分數</div>
                                                <div className="text-xl font-black text-emerald-700">{myRole ? CARD_INFO[myRole].score : 0} 分 / 隻</div>
                                            </div>
                                        </div>

                                        <div className="space-y-3">
                                            <h3 className="font-bold text-slate-700">生存判定結果 (依據背包食物)</h3>
                                            <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                                                <div className="flex justify-between items-center mb-2">
                                                    <span className="font-bold text-green-600 flex items-center gap-2">✅ 成功養活分身</span>
                                                    <span className="text-xl font-black text-green-700">{personalResult.fedCount} 隻</span>
                                                </div>
                                                <div className="flex justify-between items-center opacity-60">
                                                    <span className="font-bold text-red-600 flex items-center gap-2">💀 食物不足餓死</span>
                                                    <span className="text-lg font-bold text-red-700">{personalResult.starvedCount} 隻</span>
                                                </div>
                                                <div className="mt-4 pt-4 border-t border-slate-200 text-sm text-slate-500 italic">
                                                    💡 提示：多餘無法完整養活一隻分身的零星食物，將不予計分。
                                                </div>
                                            </div>
                                        </div>

                                        <div className="pt-6 text-center">
                                            <div className="text-lg text-slate-500 font-bold mb-2">本次遊戲個人總分</div>
                                            <div className="text-6xl font-black text-emerald-600">{personalResult.score}</div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="text-center">
                                    <button onClick={() => setViewMode('student_team_personal')} className="px-6 py-2 text-slate-500 hover:text-slate-700 hover:bg-slate-100 rounded-lg transition-colors font-bold">
                                        返回對戰雷達
                                    </button>
                                </div>
                            </div>
                        )}

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<OceanCardGame />);
    </script>
</body>
</html>
